<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>架空経済プラットフォーム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 共通テーマスタイル（環境に合わせて調整してください） */
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f7fa; color: #2c3e50; margin: 0; padding: 15px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #e1e8ed; }
    .card-header { background: #f8f9fa; padding: 12px 15px; font-weight: bold; border-bottom: 1px solid #e1e8ed; border-top-left-radius: 8px; border-top-right-radius: 8px; }
    .card-body { padding: 15px; }
    .row { display: flex; align-items: center; justify-content: space-between; }
    .spacer { flex: 1; }
    .din { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
    .input { padding: 8px 12px; border: 1px solid #ccd6dd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #3498db; color: white; }
    .btn-warning { background: #f39c12; color: white; }
    .btn-success { background: #2ecc71; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-dark { background: #34495e; color: white; }
    .btn-secondary { background: #95a5a6; color: white; }
    .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
    .tab-btn { flex: 1; padding: 10px; background: #e1e8ed; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: center; }
    .tab-btn.active { background: #34495e; color: white; }
    .hint { font-size: 12px; color: #7f8c8d; margin-top: 2px; }
    .font-green { color: #27ae60; }
    .font-orange { color: #e67e22; }
    
    /* トースト通知用スタイル */
    #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; }
    .toast-item { background: rgba(0,0,0,0.85); color: white; padding: 12px 16px; border-radius: 6px; font-size: 14px; margin-top: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); opacity: 0; transform: translateY(20px); transition: all 0.3s ease; text-align: center; white-space: pre-line; }
    .toast-item.show { opacity: 1; transform: translateY(0); }
    body.loading { opacity: 0.7; pointer-events: none; }
  </style>
</head>
<body>

<div class="container">
  <div id="game-header" class="card" style="padding:15px; background: #fff;"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="ranking" onclick="W.switchTab('ranking')">🏆 ランキング</button>
    <button class="tab-btn" data-tab="deposit" onclick="W.switchTab('deposit')">🏦 銀行預金</button>
    <button class="tab-btn" data-tab="invest" onclick="W.switchTab('invest')">📈 株式投資</button>
  </div>

  <div id="main-content"></div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { auth, subscribeAll } from './js/firebase.js';
  import { S, render, switchTab } from './js/ui.js';
  
  // 各UIファイルから関数をインポート
  import { depositCoins, addDepositCoins, withdrawDeposit, claimWithdrawal, createTermDeposit, withdrawTermDeposit } from './js/deposit.js';
  import { buyStock, sellStock } from './js/invest.js';

  // 【最重要】HTML内の onclick="W.〇〇" から呼び出せるようにオブジェクトへ明示的に登録
  const W = {};
  window.W = W;

  // 共通UI系
  W.switchTab = switchTab;

  // 預金システム用（翌日引き出し・確定機能を追加登録）
  W.depositCoins = depositCoins;
  W.addDepositCoins = addDepositCoins;
  W.withdrawDeposit = withdrawDeposit;
  W.claimWithdrawal = claimWithdrawal; // 新設
  W.createTermDeposit = createTermDeposit;
  W.withdrawTermDeposit = withdrawTermDeposit;

  // 株式投資用
  W.buyStock = buyStock;
  W.sellStock = sellStock;

  // Firebase認証の監視 & リアルタイムデータ購読の開始
  auth.onAuthStateChanged(user => {
    if (user) {
      S.uid = user.uid;
      
      // 各データの変更をリアルタイムに検知して画面に自動反映
      subscribeAll(user.uid, {
        onPlayer: (data) => { S.player = data; render(); },
        onMeta:   (data) => { S.playersMeta = data || {}; render(); },
        onStocks: (data) => { S.stocks = data || {}; render(); },
        onRoulette: (data) => { S.roulette = data || {}; render(); },
        onCompanies: (data) => { S.companies = data || {}; render(); } // 会社データ用拡張
      });
    } else {
      // 未ログイン時のフォールバック処理（必要に応じてログイン画面への誘導など）
      document.getElementById('main-content').innerHTML = `
        <div class="card"><div class="card-body" style="text-align:center;">認証されていません。ログインしてください。</div></div>
      `;
    }
  });

  // 初回表示
  render();
</script>

</body>
</html>
