<!--
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  ① Firebase コンソールでプロジェクトを作成

  ② Authentication → Sign-in method → メール/パスワード を有効化

  ③ Realtime Database を作成

  ④ Realtime Database のルールを以下に設定して「公開」:
  ─────────────────────────────────────────
  {
    "rules": {
      "players": {
        "$uid": {
          ".read":  "$uid === auth.uid",
          ".write": "$uid === auth.uid"
        }
      },
      "playersMeta": {
        ".read":  "auth != null",
        ".write": "auth != null"
      },
      "roulette": {
        ".read":  "auth != null",
        ".write": "auth != null"
      },
      "stocks": {
        ".read":  "auth != null",
        ".write": "auth != null"
      }
    }
  }
  ─────────────────────────────────────────
  ※ roulette と stocks の .write を auth != null に統一しました。
    残高などの重要データは players/$uid のルールで保護されています。

  ⑤ プロジェクトの設定 → マイアプリ → ウェブアプリを追加
     表示された firebaseConfig を下記 FIREBASE_CONFIG に貼り付ける

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

<style>

.r-cell { padding: 5px 2px; text-align: center; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 700; border: 2px solid transparent; transition: all .1s; user-select: none; line-height: 1.2; }
.r-cell:hover { opacity: .8; transform: scale(1.08); }
.r-cell.sel   { border-color: #fff !important; box-shadow: 0 0 0 2px #1a1a1a; }
.r-red   { background: #c0392b; color: #fff; border-color: #c0392b; }
.r-black { background: #2c2c2c; color: #fff; border-color: #2c2c2c; }
.r-green { background: #1d9e75; color: #fff; border-color: #1d9e75; }

<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui;color:#888">
    <div style="text-align:center"><div style="font-size:40px;margin-bottom:16px">🏛</div><div>Firebase に接続中...</div></div>
  </div>
</div>
<div id="toasts"></div>

<script type="module">
// ============================================================
//  ★ ここに Firebase の設定を貼り付けてください ★
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAoldTnCCTDdIGMA_Q3zeEf8fNGmZWPo7g",
  authDomain: "unreal-economic-platform.firebaseapp.com",
  databaseURL: "https://unreal-economic-platform-default-rtdb.firebaseio.com",
  projectId: "unreal-economic-platform",
  storageBucket: "unreal-economic-platform.firebasestorage.app",
  messagingSenderId: "169831544038",
  appId: "1:169831544038:web:04e3d06b74be5df7057727",
  measurementId: "G-TZ6F7Y6RDD"
};
// ============================================================

import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, update, onValue, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword,
         signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

let db, auth;
try {
  const app = initializeApp(FIREBASE_CONFIG);
  db   = getDatabase(app);
  auth = getAuth(app);
} catch(e) {
  document.getElementById('app').innerHTML =
    `<div style="padding:40px;max-width:500px;margin:0 auto">
       <h2 style="color:#c0392b;margin-bottom:12px">⚠ Firebase未設定</h2>
       <p style="color:#444;line-height:1.7">FIREBASE_CONFIG に設定値を貼り付けてください。</p>
       <pre style="margin-top:12px;font-size:12px;color:#888;white-space:pre-wrap">${e.message}</pre>
     </div>`;
  throw e;
}

// ---- DB ヘルパー ----
const dbGet    = async p => { const s = await get(ref(db,p)); return s.exists() ? s.val() : null; };
const dbSet    = (p,v)   => set(ref(db,p), v);
const dbUpdate = (p,v)   => update(ref(db,p), v);

// ---- 定数 ----
const RED_NUMS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
const isRed   = n => RED_NUMS.includes(n);
const isBlack = n => !isRed(n) && n > 0;
const r   = n => Math.round(n);
const fmt = n => r(n).toLocaleString('ja-JP');
const esc = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ---- State ----
const S = {
  tab: 'home',
  uid: null, pname: '',
  lmode: 'login', lerr: '',
  players: {}, playersMeta: {}, roulette: null, stocks: {},
  rbets: {},
  now: Date.now(),
  // ★ 送信処理中フラグ: trueの間はリスナーによるパネル再描画を止める
  submitting: false,
};

// ---- リアルタイム購読 ----
const unsubs = {};
function subscribeAll(uid) {
  const watch = (path, key, fn) => {
    const rf = ref(db, path);
    if (unsubs[key]) { try { off(rf); } catch(_){} }
    unsubs[key] = onValue(rf, snap => {
      fn(snap.val());
      // ★ 送信処理中はパネルを再描画しない
      if (!S.submitting) scheduleRender();
    });
  };
  watch(`players/${uid}`, 'player',   v => { if(v) S.players[uid] = v; });
  watch('playersMeta',    'meta',     v => { S.playersMeta = v || {}; });
  watch('roulette',       'roulette', v => { S.roulette = v; });
  watch('stocks',         'stocks',   v => { S.stocks = v || {}; });
}

// ---- 初期データ保証 ----
async function ensureDefaults() {
  if (!await dbGet('roulette'))
    await dbSet('roulette', { next: Date.now()+3600000, bets:{}, last:null });
  if (!await dbGet('stocks')) {
    const now = Date.now();
    await dbSet('stocks', {
      ALPHA: { name:'Alpha Corp', price:100, history:[100], nextUpdate:now+43200000 },
      BETA:  { name:'Beta Inc',   price:80,  history:[80],  nextUpdate:now+43200000 },
      GAMMA: { name:'Gamma Ltd',  price:50,  history:[50],  nextUpdate:now+43200000 },
    });
  }
}

// ---- 利息計算（表示用） ----
function calcInterest(p) {
  const now = Date.now();
  return {
    depBal:  p.deposit     ? r(p.deposit.principal     * Math.pow(1.01,(now-p.deposit.since)    /86400000)) : 0,
    tdepBal: p.termDeposit ? r(p.termDeposit.principal * Math.pow(1.02,(now-p.termDeposit.since)/86400000)) : 0,
  };
}

// ---- ランキング用スコア ----
function rankTotal(p) {
  return r((p.coins||0)+(p.deposit?.principal||0)+(p.termDeposit?.principal||0)+(p.rouletteBet||0)+(p.investedCost||0));
}

// ---- ルーレット払い戻し ----
function calcWin(type, result, amt) {
  const a=r(amt), n=result;
  if (type.startsWith('num_')) return parseInt(type.slice(4))===n?a*36:0;
  if (type==='red')   return n>0&&isRed(n)   ?a*2:0;
  if (type==='black') return n>0&&isBlack(n) ?a*2:0;
  if (type==='even')  return n>0&&n%2===0    ?a*2:0;
  if (type==='odd')   return n>0&&n%2!==0    ?a*2:0;
  if (type==='low')   return n>=1&&n<=18     ?a*2:0;
  if (type==='high')  return n>=19&&n<=36    ?a*2:0;
  if (type==='col1')  return n>0&&n%3===1    ?a*3:0;
  if (type==='col2')  return n>0&&n%3===2    ?a*3:0;
  if (type==='col3')  return n>0&&n%3===0    ?a*3:0;
  if (type==='doz1')  return n>=1&&n<=12     ?a*3:0;
  if (type==='doz2')  return n>=13&&n<=24    ?a*3:0;
  if (type==='doz3')  return n>=25&&n<=36    ?a*3:0;
  return 0;
}

// ---- Toast ----
function toast(msg, ms=3500) {
  const d=document.createElement('div');
  d.className='toast'; d.textContent=msg;
  document.getElementById('toasts').appendChild(d);
  setTimeout(()=>d.remove(), ms);
}

// ======================================================
//  レンダリング管理
//  ★ submitting=true の間はパネルを再描画しない
//  ★ 毎秒タイマーは数値表示のみDOMを直接書き換える（再生成なし）
// ======================================================

let mainRendered = false;
let renderScheduled = false;

function scheduleRender() {
  if (renderScheduled || S.submitting) return;
  renderScheduled = true;
  requestAnimationFrame(() => {
    renderScheduled = false;
    if (!S.submitting) doRender();
  });
}

function doRender() {
  if (!S.uid) { renderLogin(); return; }
  const p = S.players[S.uid]; if (!p) return;
  buildShell(p);
  renderPanel(p);
}

function buildShell(p) {
  const TABS = [
    {id:'home',     icon:'🏠', label:'ホーム'},
    {id:'deposit',  icon:'🏦', label:'預金'},
    {id:'roulette', icon:'🎰', label:'ルーレット'},
    {id:'invest',   icon:'📈', label:'投資'},
    {id:'ranking',  icon:'🏆', label:'ランキング'},
  ];
  if (!mainRendered) {
    mainRendered = true;
    document.getElementById('app').innerHTML = `
      <div class="header">
        <span class="logo">🏛 架空市場</span>
        <span class="spacer"></span>
        <span class="badge badge-dark" id="hdr-name"></span>
        <button class="btn" style="font-size:12px;padding:5px 10px" onclick="W.logout()">ログアウト</button>
      </div>
      <div class="tab-bar" id="tab-bar"></div>
      <div class="panel" id="main-panel"></div>`;
  }
  const hdr = document.getElementById('hdr-name');
  if (hdr) hdr.textContent = p.name || S.pname || '';
  const tb = document.getElementById('tab-bar');
  if (tb) tb.innerHTML = TABS.map(t =>
    `<button class="tab ${S.tab===t.id?'active':''}" onclick="W._setTab('${t.id}')">${t.icon} ${t.label}</button>`
  ).join('');
}

function renderPanel(p) {
  const panel = document.getElementById('main-panel'); if (!panel) return;
  let html = '';
  if (S.tab==='home')     html = buildHome(p);
  if (S.tab==='deposit')  html = buildDeposit(p);
  if (S.tab==='roulette') html = buildRoulette(p);
  if (S.tab==='invest')   html = buildInvest(p);
  if (S.tab==='ranking')  html = buildRanking();
  panel.innerHTML = html;
}

// ★ 送信処理のラッパー
// 処理中はsubmitting=trueにしてリスナーの再描画を止め、
// 完了後にsubmitting=falseにしてから一度だけ再描画する
async function withSubmit(fn) {
  S.submitting = true;
  try {
    await fn();
  } catch(e) {
    toast('エラーが発生しました: ' + e.message);
    console.error(e);
  } finally {
    S.submitting = false;
    // 処理完了後に一度だけ再描画
    const p = S.players[S.uid];
    if (p) {
      buildShell(p);
      renderPanel(p);
    }
  }
}

// ---- 毎秒タイマー：数値のみ直接書き換え ----
function updateMetricsOnly() {
  if (!S.uid) return;
  S.now = Date.now();
  const p = S.players[S.uid]; if (!p) return;
  const now = S.now;
  const elapsed = now-(p.lastTicketTime||now);
  const secLeft = Math.ceil(Math.max(0,60000-elapsed%60000)/1000);
  const totalT  = (p.tickets||0)+(p.rareTickets||0);
  const {depBal,tdepBal} = calcInterest(p);
  let invVal=0;
  for (const [sym,qty] of Object.entries(p.holdings||{}))
    if (S.stocks[sym]) invVal += S.stocks[sym].price*(qty||0);
  const total = r((p.coins||0)+depBal+tdepBal+(p.rouletteBet||0)+r(invVal));
  const els = {
    'mv-hand':  fmt(r(p.coins||0)),
    'mv-total': fmt(total),
    'mv-tick':  String(p.tickets||0),
    'mv-rare':  String(p.rareTickets||0),
    'mv-next':  `${totalT}/100枚 | 次回: ${secLeft}秒後`,
  };
  for (const [id,val] of Object.entries(els)) {
    const el = document.getElementById(id); if (el) el.textContent = val;
  }
  const pf = document.getElementById('tick-fill');
  if (pf) pf.style.width = `${totalT}%`;
  if (S.roulette && S.tab==='roulette') {
    const tl = Math.max(0,S.roulette.next-now);
    const rt = document.getElementById('r-timer');
    if (rt) rt.textContent = tl<500?'🔴 開催中！':`${Math.floor(tl/60000)}分${Math.floor((tl%60000)/1000)}秒後`;
    const rf2 = document.getElementById('r-fill');
    if (rf2) rf2.style.width = `${Math.min(100,(1-tl/3600000)*100)}%`;
  }
}

// ---- ホーム ----
function buildHome(p) {
  const now = S.now;
  const elapsed = now-(p.lastTicketTime||now);
  const secLeft = Math.ceil(Math.max(0,60000-elapsed%60000)/1000);
  const totalT  = (p.tickets||0)+(p.rareTickets||0);
  const {depBal,tdepBal} = calcInterest(p);
  let invVal=0;
  for (const [sym,qty] of Object.entries(p.holdings||{}))
    if (S.stocks[sym]) invVal += S.stocks[sym].price*(qty||0);
  invVal=r(invVal);
  const total = r((p.coins||0)+depBal+tdepBal+(p.rouletteBet||0)+invVal);
  const nt=p.tickets||0, nr=p.rareTickets||0;
  return `
  <div class="metrics">
    <div class="metric"><div class="ml">手持ち</div><div class="mv"><span id="mv-hand">${fmt(r(p.coins||0))}</span><span class="mu"> C</span></div></div>
    <div class="metric"><div class="ml">総資産(評価)</div><div class="mv"><span id="mv-total">${fmt(total)}</span><span class="mu"> C</span></div></div>
    <div class="metric"><div class="ml">チケット</div><div class="mv"><span id="mv-tick">${nt}</span><span class="mu">枚</span></div></div>
    <div class="metric"><div class="ml" style="color:#7a5c00">★ レア</div><div class="mv" style="color:#7a5c00"><span id="mv-rare">${nr}</span><span class="mu">枚</span></div></div>
  </div>
  <div class="card">
    <div class="row" style="margin-bottom:7px">
      <span class="card-title" style="margin:0">チケット</span>
      <span class="spacer"></span>
      <span class="hint" id="mv-next">${totalT}/100枚 | 次回: ${secLeft}秒後</span>
    </div>
    <div class="progress-bar" style="margin-bottom:12px">
      <div class="progress-fill" id="tick-fill" style="width:${totalT}%"></div>
    </div>
    <div class="ticket-section">
      <div class="ticket-row">
        <span class="ticket-label">🎟 チケット（×1 COIN）</span>

// ---- ルーレット ----
function buildRoulette(p) {
  const rd=S.roulette, now=S.now;
  const timeLeft=rd?Math.max(0,rd.next-now):0;
  const pct=Math.min(100,(1-timeLeft/3600000)*100);
  const mins=Math.floor(timeLeft/60000), secs=Math.floor((timeLeft%60000)/1000);
  const myBet=rd?.bets?.[S.uid];
  const bets=S.rbets;
  const betTotal=r(Object.values(bets).reduce((a,b)=>a+b,0));
  const numGrid=(()=>{
    let h='';
    for(let row=0;row<3;row++){
      let cells='';
      for(let col=0;col<12;col++){
        const n=col*3+(3-row);
        cells+=`<div class="r-cell ${isRed(n)?'r-red':'r-black'} ${bets['num_'+n]?'sel':''}" onclick="W._toggleBet('num_${n}')">${n}</div>`;
      }
      h+=`<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:2px">${cells}</div>`;
    }
    return h;
  })();
  return `
  <div class="card">
    <div class="row" style="margin-bottom:6px">
      <span class="card-title" style="margin:0">🎰 アメリカンルーレット</span>
      <span class="spacer"></span>
      <span class="hint" id="r-timer">${timeLeft<500?'🔴 開催中！':`${mins}分${secs}秒後`}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="r-fill" style="width:${pct}%"></div></div>
    ${rd?.last!=null?`<div class="hint" style="margin-top:6px">前回の結果: <strong>${rd.last===-1?'00':rd.last}</strong></div>`:''}
  </div>
  ${myBet?`<div class="card"><div class="row"><span style="font-weight:700">📌 ベット済み</span><span class="spacer"></span><span class="badge badge-red">${fmt(r(myBet.amount))} COIN</span></div><div class="hint" style="margin-top:4px">${Object.entries(myBet.bets||{}).map(([k,v])=>`${k}:${r(v)}C`).join(' | ')}</div></div>`:''}
  <div class="card">
    <div class="row" style="margin-bottom:8px">
      <span style="font-weight:700;font-size:13px">ベット額（箇所ごと）</span>
      <input class="input" id="bet-amt" type="number" min="1" value="1" style="width:70px;margin-left:4px" />
      <span class="hint">COIN</span>
      <span class="spacer"></span>
      ${betTotal>0?`<span class="badge badge-red">計 ${fmt(betTotal)} C</span>`:''}
    </div>
    <div style="display:grid;grid-template-columns:38px 1fr;gap:3px;margin-bottom:3px">
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="r-cell r-green ${bets['num_0']?'sel':''}" onclick="W._toggleBet('num_0')" style="flex:1;display:flex;align-items:center;justify-content:center">0</div>
        <div class="r-cell r-green ${bets['num_-1']?'sel':''}" onclick="W._toggleBet('num_-1')" style="flex:1;display:flex;align-items:center;justify-content:center">00</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px">${numGrid}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:4px">
      ${[['col1','列1 (3:1)'],['col2','列2 (3:1)'],['col3','列3 (3:1)']].map(([c,l])=>`<div class="r-cell r-out ${bets[c]?'sel':''}" onclick="W._toggleBet('${c}')">${l}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:3px">

// ---- 投資 ----
function buildInvest(p) {
  let html=`<div class="hint" style="margin-bottom:10px">★ 株価は12時間ごとに更新（取引量が価格変動に影響）</div>`;
  for (const [sym,s] of Object.entries(S.stocks)) {
    const held=r(p.holdings?.[sym]||0);
    const hist=s.history||[s.price];
    const prev=hist.length>1?hist[hist.length-2]:s.price;
    const chg=r(s.price)-r(prev);
    const mn=Math.min(...hist),mx=Math.max(...hist),rng=mx-mn||1;
    const pts=hist.map((v,i)=>`${i/(hist.length-1||1)*200},${36-(v-mn)/rng*30}`).join(' ');
    const hLeft=Math.max(0,Math.floor(((s.nextUpdate||0)-S.now)/3600000));
    const mLeft=Math.max(0,Math.floor((((s.nextUpdate||0)-S.now)%3600000)/60000));
    html+=`<div class="card">
      <div class="row" style="margin-bottom:4px">
        <span style="font-weight:800;font-size:14px">${esc(sym)}</span>
        <span class="hint" style="margin-left:2px">${esc(s.name)}</span>
        <span class="spacer"></span>
        <span style="font-weight:700;font-size:16px">${fmt(r(s.price))} C</span>
        <span class="${chg>=0?'price-up':'price-down'}" style="font-size:12px">${chg>=0?'+':''}${fmt(chg)}</span>
      </div>
      <svg viewBox="0 0 200 40" style="width:100%;height:44px;display:block;margin-bottom:5px">
        <polyline points="${pts}" fill="none" stroke="${chg>=0?'#1d9e75':'#c0392b'}" stroke-width="1.5"/>
      </svg>
      <div class="hint" style="margin-bottom:8px">次回更新まで ${hLeft}時間${mLeft}分 | 保有: ${held}株 (≈${fmt(r(held*s.price))} C)</div>
      <div class="row" style="gap:6px">
        <input class="input" id="buy-${sym}" type="number" min="1" placeholder="買い株数" style="width:90px" />
        <button class="btn btn-primary" onclick="W.buyStock('${sym}')">買う</button>
        ${held>0?`
        <input class="input" id="sell-${sym}" type="number" min="1" max="${held}" placeholder="売り株数" style="width:90px" />
        <button class="btn btn-danger" onclick="W.sellStock('${sym}')">売る</button>`:''}
        <span class="hint">手持ち: ${fmt(r(p.coins||0))} C</span>
      </div>
    </div>`;
  }
  return html;
}

// ---- メタ更新 ----
async function pushMeta(p) {
  if (!S.uid) return;
  await dbUpdate(`playersMeta/${S.uid}`, {
    name: p.name||S.pname,
    rankTotal: rankTotal(p),
    detail: {
      coins: r(p.coins||0),
      dep:   p.deposit?.principal     ? r(p.deposit.principal)     : 0,
      tdep:  p.termDeposit?.principal ? r(p.termDeposit.principal) : 0,
      rbet:  r(p.rouletteBet||0),
      inv:   r(p.investedCost||0),
    }
  });
}

// ---- 定期チェック ----
let checking = false;
async function periodicCheck() {
  if (!S.uid||checking) return;
  checking = true;
  try {
    await checkTickets();
    await checkRoulette();
    await checkStocks();
  } finally { checking=false; }
}

async function checkTickets() {
  const p=await dbGet(`players/${S.uid}`); if(!p) return;
  const now=Date.now();
  const elapsed=now-(p.lastTicketTime||now);
  const newT=Math.floor(elapsed/60000); if(newT<=0) return;
  const avail=Math.max(0,100-(p.tickets||0)-(p.rareTickets||0));
  const add=Math.min(newT,avail);
  let nn=0,nr=0;
  // 1枚ずつ独立した乱数で正確に10%
  for(let i=0;i<add;i++) Math.random()<0.1?nr++:nn++;
  await dbUpdate(`players/${S.uid}`,{
    tickets:        (p.tickets||0)+nn,
    rareTickets:    (p.rareTickets||0)+nr,
    lastTicketTime: (p.lastTicketTime||now)+newT*60000,
  });
  if(nr>0) toast(`★ レアチケット×${nr}枚獲得！`);
  else if(nn>0) toast(`チケット×${nn}枚獲得`);
}

async function checkRoulette() {
  const rd=await dbGet('roulette'); if(!rd||Date.now()<rd.next) return;
  const result=Math.floor(Math.random()*38)===37?-1:Math.floor(Math.random()*38);
  const myBet=rd.bets?.[S.uid];
  if(myBet){
    const p=await dbGet(`players/${S.uid}`); if(!p) return;
    let win=0;
    for(const[t,a] of Object.entries(myBet.bets||{})) win+=calcWin(t,result,a);
    win=r(win);
    const upd={coins:r((p.coins||0)+win),rouletteBet:Math.max(0,r((p.rouletteBet||0)-r(myBet.amount)))};
    await dbUpdate(`players/${S.uid}`,upd);
    await dbSet(`roulette/bets/${S.uid}`,null);
    await pushMeta({...p,...upd});
    toast(win>0?`🎰 ルーレット: ${result===-1?'00':result} → +${fmt(win)} COIN獲得！`:`🎰 ルーレット: ${result===-1?'00':result} — 残念...`,5000);
  }
  if((rd.next||0)<=Date.now())
    await dbUpdate('roulette',{next:Date.now()+3600000,last:result});
}

async function checkStocks() {
  const stocks=S.stocks; if(!Object.keys(stocks).length) return;
  const p=S.players[S.uid]; if(!p) return;
  for(const[sym,s] of Object.entries(stocks)){
    if(Date.now()<(s.nextUpdate||0)) continue;
    const held=p.holdings?.[sym]||0;
    const asset=r(p.coins||0)+r(p.deposit?.principal||0)+r(p.termDeposit?.principal||0);
    const base=Math.max(asset,100);
    const ratio=(base+s.price*held)/base;
    const noise=(Math.random()-0.5)*0.06;
    const newPrice=Math.max(1,r(s.price*ratio*(1+noise)));
    const history=[...(s.history||[s.price]),newPrice].slice(-60);
    await dbUpdate(`stocks/${sym}`,{price:newPrice,history,nextUpdate:Date.now()+43200000});
    toast(`📊 ${sym} 株価更新: ${fmt(newPrice)} C`);
  }
}

window.W = {

  _setMode(m)  { S.lmode=m; S.lerr=''; renderLogin(); },
  _setTab(t)   { S.tab=t; scheduleRender(); },
  _clearBets() { S.rbets={}; const p=S.players[S.uid]; if(p&&!S.submitting) renderPanel(p); },
  _toggleBet(type) {
    const amtEl=document.getElementById('bet-amt');
    const amt=Math.max(1,r(parseFloat(amtEl?.value)||1));
    if(S.rbets[type]) delete S.rbets[type]; else S.rbets[type]=amt;
    const p=S.players[S.uid]; if(p&&!S.submitting) renderPanel(p);
  },
  // クイックボタン: 枚数欄の値を変えるだけ（DOM再生成なし）
  _qt(kind,n) {
    const el=document.getElementById(kind==='n'?'conv-n':'conv-r');
    if(el) el.value=String(n);
  },

  // ---- ログイン ----
  async login() {
    const email=document.getElementById('l-email')?.value.trim();
    const pass =document.getElementById('l-pass')?.value.trim();
    const name =document.getElementById('l-name')?.value.trim();
    if(!email||!pass){ S.lerr='メールアドレスとパスワードを入力してください'; renderLogin(); return; }
    if(S.lmode==='register'&&!name){ S.lerr='プレイヤー名を入力してください'; renderLogin(); return; }
    // ★ ログイン処理中もsubmittingでリスナーを止める
    S.submitting=true;
    try {
      if(S.lmode==='register'){
        const cred=await createUserWithEmailAndPassword(auth,email,pass);
        const uid=cred.user.uid, now=Date.now();
        const np={id:uid,name,coins:0,tickets:0,rareTickets:0,lastTicketTime:now,
                  deposit:null,depositBalance:0,termDeposit:null,termDepositBalance:0,
                  rouletteBet:0,holdings:{},investedCost:0};
        // ★ 認証完了を待ってからDBに書き込む
        await new Promise(resolve => {
          const unsub = onAuthStateChanged(auth, user => {
            if(user && user.uid===uid){ unsub(); resolve(); }
          });
        });
        await dbSet(`players/${uid}`,np);
        await pushMeta(np);
        toast(`ようこそ、${name}さん！`);
      } else {
        await signInWithEmailAndPassword(auth,email,pass);
        toast('ログインしました');
      }
      S.lerr=''; S.tab='home';
    } catch(e){
      const msgs={
        'auth/email-already-in-use':  'そのメールは既に登録されています',
        'auth/invalid-email':         'メールアドレスの形式が正しくありません',
        'auth/weak-password':         'パスワードは6文字以上にしてください',
        'auth/invalid-credential':    'メールアドレスまたはパスワードが間違っています',
        'auth/user-not-found':        'アカウントが見つかりません',
        'auth/wrong-password':        'パスワードが間違っています',
      };
      S.lerr=msgs[e.code]||e.message;
      S.submitting=false;
      renderLogin();
    }
  },

  async logout() {
    await signOut(auth);
    S.uid=null; S.pname=''; S.tab='home'; mainRendered=false; S.submitting=false;
    Object.keys(unsubs).forEach(k=>{ unsubs[k]=null; });
    renderLogin();
  },

  // ---- チケット変換 ----
  async useTicket(type) {
    await withSubmit(async()=>{
      const p=await dbGet(`players/${S.uid}`); if(!p) return;
      if(type==='normal'){
        const maxN=p.tickets||0; if(maxN<1){ toast('チケットがありません'); return; }
        const n=Math.max(1,Math.min(r(parseFloat(document.getElementById('conv-n')?.value)||1),maxN));
        await dbUpdate(`players/${S.uid}`,{tickets:maxN-n, coins:r((p.coins||0)+n)});
        await pushMeta({...p, tickets:maxN-n, coins:r((p.coins||0)+n)});
        toast(`+${fmt(n)} COIN獲得！（チケット${n}枚使用）`);
      } else {
        const maxR=p.rareTickets||0; if(maxR<1){ toast('レアチケットがありません'); return; }
        const n=Math.max(1,Math.min(r(parseFloat(document.getElementById('conv-r')?.value)||1),maxR));
        let gain=0;
        for(let i=0;i<n;i++) gain+=Math.floor(Math.random()*10)+1;
        await dbUpdate(`players/${S.uid}`,{rareTickets:maxR-n, coins:r((p.coins||0)+gain)});
        await pushMeta({...p, rareTickets:maxR-n, coins:r((p.coins||0)+gain)});
        toast(`★ レアチケット${n}枚使用！ +${fmt(gain)} COIN！`);
      }
    });
  },

  // ---- 普通預金 ----
  async doDeposit() {
    await withSubmit(async()=>{
      const amt=r(parseFloat(document.getElementById('dep-in')?.value)||0);
      if(amt<=0){ toast('金額を入力してください'); return; }
      const p=await dbGet(`players/${S.uid}`);
      if(amt>r(p.coins||0)){ toast('COINが不足しています'); return; }
      const upd={coins:r((p.coins||0)-amt), deposit:{principal:amt,since:Date.now()}, depositBalance:amt};
      await dbUpdate(`players/${S.uid}`,upd);
      await pushMeta({...p,...upd});
      toast(`${fmt(amt)} COINを預金しました`);
    });
  },

  async addDeposit() {
    await withSubmit(async()=>{
      const amt=r(parseFloat(document.getElementById('dep-add')?.value)||0);
      if(amt<=0){ toast('金額を入力してください'); return; }
      const p=await dbGet(`players/${S.uid}`);
      if(amt>r(p.coins||0)){ toast('COINが不足しています'); return; }
      const now=Date.now();
      const curBal=r(p.deposit.principal*Math.pow(1.01,(now-p.deposit.since)/86400000));
      const np=r(curBal+amt);
      const upd={coins:r((p.coins||0)-amt), deposit:{principal:np,since:now}, depositBalance:np};
      await dbUpdate(`players/${S.uid}`,upd);
      await pushMeta({...p,...upd});
      toast(`${fmt(amt)} COINを追加預金しました`);
    });
  },

  async withdrawDeposit() {
    await withSubmit(async()=>{
      const p=await dbGet(`players/${S.uid}`); if(!p?.deposit) return;
      const bal=r(p.deposit.principal*Math.pow(1.01,(Date.now()-p.deposit.since)/86400000));
      const upd={coins:r((p.coins||0)+bal), deposit:null, depositBalance:0};
      await dbUpdate(`players/${S.uid}`,upd);
      await pushMeta({...p,...upd});
      toast(`${fmt(bal)} COINを引き出しました`);
    });
  },

  // ---- 定期預金 ----
  async doTermDeposit() {
    await withSubmit(async()=>{
      const amt=r(parseFloat(document.getElementById('tdep-in')?.value)||0);
      const days=parseInt(document.getElementById('tdep-days')?.value)||7;
      if(amt<=0){ toast('金額を入力してください'); return; }
      if(days<7){ toast('7日以上を指定してください'); return; }
      const p=await dbGet(`players/${S.uid}`);
      if(p.termDeposit?.principal>0){ toast('既に定期預金があります'); return; }
      if(amt>r(p.coins||0)){ toast('COINが不足しています'); return; }
      const upd={coins:r((p.coins||0)-amt), termDeposit:{principal:amt,since:Date.now(),days}, termDepositBalance:amt};
      await dbUpdate(`players/${S.uid}`,upd);
      await pushMeta({...p,...upd});
      toast(`${fmt(amt)} COINを${days}日間定期預金しました`);
    });
  },

  async withdrawTermDeposit() {
    await withSubmit(async()=>{
      const p=await dbGet(`players/${S.uid}`); if(!p?.termDeposit) return;
      const elapsed=(Date.now()-p.termDeposit.since)/86400000;
      const matured=elapsed>=p.termDeposit.days;
      const ret=matured?r(p.termDeposit.principal*Math.pow(1.02,elapsed)):r(p.termDeposit.principal);
      const upd={coins:r((p.coins||0)+ret), termDeposit:null, termDepositBalance:0};
      await dbUpdate(`players/${S.uid}`,upd);
      await pushMeta({...p,...upd});
      toast(matured?`定期満期！ ${fmt(ret)} COIN返還`:`期限前解約。元本 ${fmt(ret)} COIN返還`);
    });
  },

  // ---- ルーレット ----
  async placeBet() {
    await withSubmit(async()=>{
      const total=r(Object.values(S.rbets).reduce((a,b)=>a+b,0));
      if(total<=0){ toast('賭け箇所を選んでください'); return; }
      const p=await dbGet(`players/${S.uid}`);
      if(total>r(p.coins||0)){ toast('COINが不足しています'); return; }
      const rd=await dbGet('roulette')||{next:Date.now()+3600000,bets:{}};
      const ex=rd.bets?.[S.uid];
      let nb,na;
      if(ex){
        nb={...ex.bets};
        for(const[k,v] of Object.entries(S.rbets)) nb[k]=r((nb[k]||0)+v);
        na=r((ex.amount||0)+total);
      } else { nb={...S.rbets}; na=total; }
      await dbSet(`roulette/bets/${S.uid}`,{playerId:S.uid,bets:nb,amount:na});
      const upd={coins:r((p.coins||0)-total), rouletteBet:r((p.rouletteBet||0)+total)};
      await dbUpdate(`players/${S.uid}`,upd);
      await pushMeta({...p,...upd});
      S.rbets={};
      toast(`${fmt(total)} COINをベット確定！`);
    });
  },

  // ---- 投資 ----
  async buyStock(sym) {
    await withSubmit(async()=>{
      const qty=r(parseFloat(document.getElementById('buy-'+sym)?.value)||0);
      if(qty<=0){ toast('株数を入力してください'); return; }
      const s=S.stocks[sym]; if(!s) return;
      const cost=r(s.price*qty);
      const p=await dbGet(`players/${S.uid}`);
      if(cost>r(p.coins||0)){ toast('COINが不足しています'); return; }
      const holdings={...(p.holdings||{})};
      holdings[sym]=r((holdings[sym]||0)+qty);
      const upd={coins:r((p.coins||0)-cost), holdings, investedCost:r((p.investedCost||0)+cost)};
      await dbUpdate(`players/${S.uid}`,upd);
      await pushMeta({...p,...upd});
      toast(`${sym} ${qty}株を購入 (-${fmt(cost)} COIN)`);
    });
  },

  async sellStock(sym) {
    await withSubmit(async()=>{
      const qty=r(parseFloat(document.getElementById('sell-'+sym)?.value)||0);
      if(qty<=0){ toast('株数を入力してください'); return; }
      const p=await dbGet(`players/${S.uid}`);
      if((p.holdings?.[sym]||0)<qty){ toast('保有数が不足しています'); return; }
      const s=S.stocks[sym]; if(!s) return;
      const rev=r(s.price*qty);
      const totalHeld=Object.values(p.holdings||{}).reduce((a,b)=>a+b,0);
      const avgCost=totalHeld>0?(p.investedCost||0)/totalHeld:0;
      const holdings={...(p.holdings||{})};
      holdings[sym]=r((holdings[sym]||0)-qty);
      const upd={coins:r((p.coins||0)+rev), holdings, investedCost:Math.max(0,r((p.investedCost||0)-r(avgCost*qty)))};
      await dbUpdate(`players/${S.uid}`,upd);
      await pushMeta({...p,...upd});
      toast(`${sym} ${qty}株を売却 (+${fmt(rev)} COIN)`);
    });
  },
};

// ======================================================
//  起動
// ======================================================
async function main() {
  renderLogin();

  onAuthStateChanged(auth, async user => {
    if (user) {
      S.uid=user.uid;
      S.submitting=false; // ログイン完了でフラグ解除
      await ensureDefaults();
      const p=await dbGet(`players/${S.uid}`);
      if(p){ S.pname=p.name; await pushMeta(p); }
      subscribeAll(S.uid);
      S.tab='home';
      scheduleRender();
    } else {
      S.uid=null; S.pname=''; mainRendered=false; S.submitting=false;
      renderLogin();
    }
  });

  setInterval(updateMetricsOnly, 1000);
  setInterval(periodicCheck, 10000);
}

main().catch(e=>{
  console.error(e);
  document.getElementById('app').innerHTML=
    `<div style="padding:40px;font-family:system-ui;color:#c0392b">
       <h2>起動エラー</h2><p style="margin-top:8px;color:#444">${e.message}</p>
     </div>`;
});
</script>
</body>
</html>
