  ③ Realtime Database を有効化（テストモードで開始でOK）

  ④ 以下のSecurity Rulesを設定（Realtime Database → ルール）:
  ─────────────────────────────────────────
  {
    "rules": {
      "players": {
        "$uid": {
          ".read":  "$uid === auth.uid",
          ".write": "$uid === auth.uid"
        }
      },
      "playersMeta": {
        ".read": "auth != null",
        ".write": "auth != null"
      },
      "roulette": {
        ".read": "auth != null",
        "bets": {
          "$uid": {

          }
        },
        "next":  { ".write": false },
        "last":  { ".write": false }
      },
      "stocks": {
        ".read": "auth != null",
        ".write": false
      }
    }

  ─────────────────────────────────────────

     クライアントからの書き込みを禁止しています。
     Cloud Functions なしで簡易運用する場合は ".write": "auth != null" に変更してください。

import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, update,
         onValue, off, serverTimestamp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ---- 初期化 ----
let app, db, auth;
try {
  app  = initializeApp(FIREBASE_CONFIG);
  db   = getDatabase(app);
  auth = getAuth(app);
} catch(e) {

// ---- DB ヘルパー ----
const dbGet    = async path => { const s = await get(ref(db, path)); return s.exists() ? s.val() : null; };
const dbSet    = async (path, val) => set(ref(db, path), val);
const dbUpdate = async (path, val) => update(ref(db, path), val);

// ---- 定数 ----
const RED_NUMS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
const isRed    = n => RED_NUMS.includes(n);
const isBlack  = n => !isRed(n) && n > 0;
const r   = n => Math.round(n);
const fmt = n => r(n).toLocaleString('ja-JP');

// ---- State ----
const S = {
  tab: 'home',
  uid: null, pname: '',
  players: {}, roulette: null, stocks: {},
  // ログイン
  lmode: 'login', lemail: '', lpass: '', lname: '', lerr: '',
  // 預金
  depAmt: '', tdepAmt: '', tdepDays: '7',
  // ルーレット
  rbets: {}, rbetAmt: '1',
  // 投資
  buyAmt: {}, sellAmt: {},
  // チケット変換
  ticketConvertAmt: '1', rareConvertAmt: '1',
  now: Date.now(),
};

// ---- リアルタイム購読 ----
const unsubs = {};
function subscribeAll(uid) {
  // 自分のプレイヤーデータ
  const pRef = ref(db, `players/${uid}`);
  if (unsubs.player) off(pRef);
  unsubs.player = onValue(pRef, snap => {
    if (snap.exists()) { S.players[uid] = snap.val(); render(); }
  });
  // 全員のメタ情報（ランキング用）
  const mRef = ref(db, 'playersMeta');
  if (unsubs.meta) off(mRef);
  unsubs.meta = onValue(mRef, snap => {
    S.playersMeta = snap.val() || {};
    render();
  });
  // ルーレット
  const rRef = ref(db, 'roulette');
  if (unsubs.roulette) off(rRef);
  unsubs.roulette = onValue(rRef, snap => { S.roulette = snap.val(); render(); });
  // 株
  const sRef = ref(db, 'stocks');
  if (unsubs.stocks) off(sRef);
  unsubs.stocks = onValue(sRef, snap => { S.stocks = snap.val() || {}; render(); });
}

// ---- 初期データ作成 ----
async function ensureDefaults() {
  const rd = await dbGet('roulette');
  if (!rd) await dbSet('roulette', { next: Date.now() + 3600000, bets: {}, last: null });
  const sd = await dbGet('stocks');
  if (!sd) {
    const now = Date.now();
    await dbSet('stocks', {
      ALPHA: { name: 'Alpha Corp', price: 100, history: [100], nextUpdate: now + 43200000 },
      BETA:  { name: 'Beta Inc',   price: 80,  history: [80],  nextUpdate: now + 43200000 },
      GAMMA: { name: 'Gamma Ltd',  price: 50,  history: [50],  nextUpdate: now + 43200000 },
    });
  }
}

// ---- 利息をローカルで計算（表示用） ----
function calcInterest(p) {
  const now = Date.now();
  let depBal = 0, tdepBal = 0;
  if (p.deposit && p.deposit.principal > 0) {
    depBal = r(p.deposit.principal * Math.pow(1.01, (now - p.deposit.since) / 86400000));
  }
  if (p.termDeposit && p.termDeposit.principal > 0) {
    tdepBal = r(p.termDeposit.principal * Math.pow(1.02, (now - p.termDeposit.since) / 86400000));
  }
  return { depBal, tdepBal };
}

// ---- ランキング用スコア（元本ベース） ----
function rankTotal(p) {
  return r(
    (p.coins       || 0) +
    (p.deposit     ? p.deposit.principal     || 0 : 0) +
    (p.termDeposit ? p.termDeposit.principal || 0 : 0) +
    (p.rouletteBet || 0) +
    (p.investedCost|| 0)
  );
}

// ---- ルーレット払い戻し ----
function calcRouletteWin(type, result, amt) {
  const a = r(amt), n = result; // -1 = 00
  if (type.startsWith('num_')) return parseInt(type.slice(4)) === n ? a * 36 : 0;
  if (type === 'red')   return (n > 0 && isRed(n))    ? a * 2 : 0;
  if (type === 'black') return (n > 0 && isBlack(n))  ? a * 2 : 0;
  if (type === 'even')  return (n > 0 && n % 2 === 0) ? a * 2 : 0;
  if (type === 'odd')   return (n > 0 && n % 2 !== 0) ? a * 2 : 0;
  if (type === 'low')   return (n >= 1  && n <= 18)   ? a * 2 : 0;
  if (type === 'high')  return (n >= 19 && n <= 36)   ? a * 2 : 0;
  if (type === 'col1')  return (n > 0 && n % 3 === 1) ? a * 3 : 0;
  if (type === 'col2')  return (n > 0 && n % 3 === 2) ? a * 3 : 0;
  if (type === 'col3')  return (n > 0 && n % 3 === 0) ? a * 3 : 0;
  if (type === 'doz1')  return (n >= 1  && n <= 12)   ? a * 3 : 0;
  if (type === 'doz2')  return (n >= 13 && n <= 24)   ? a * 3 : 0;
  if (type === 'doz3')  return (n >= 25 && n <= 36)   ? a * 3 : 0;
  return 0;
}

// ---- 定期チェック（10秒ごと） ----
let checking = false;
async function periodicCheck() {
  S.now = Date.now();
  if (!S.uid || checking) { render(); return; }
  checking = true;
  try {
    await checkTickets();
    await checkRoulette();
    await checkStocks();
  } finally {
    checking = false;
    render();
  }
}

async function checkTickets() {
  const p = await dbGet(`players/${S.uid}`); if (!p) return;
  const elapsed = S.now - (p.lastTicketTime || S.now);
  const newT = Math.floor(elapsed / 60000);
  if (newT <= 0) return;
  const avail = 100 - (p.tickets || 0) - (p.rareTickets || 0);
  const add = Math.min(newT, Math.max(0, avail));
  let nr = 0, nn = 0;
  for (let i = 0; i < add; i++) { if (Math.random() < 0.1) nr++; else nn++; }
  const upd = {
    tickets:        (p.tickets     || 0) + nn,
    rareTickets:    (p.rareTickets || 0) + nr,
    lastTicketTime: (p.lastTicketTime || S.now) + newT * 60000,
  };
  await dbUpdate(`players/${S.uid}`, upd);
  if (nr > 0) showToast(`★ レアチケット×${nr}枚獲得！`);
  else if (nn > 0) showToast(`チケット×${nn}枚獲得`);
}

async function checkRoulette() {
  const rd = await dbGet('roulette'); if (!rd || S.now < rd.next) return;
  // ルーレット抽選
  const spin = Math.floor(Math.random() * 38);
  const result = spin === 37 ? -1 : spin;
  // 自分のベット分だけ処理（Security Rules上、他人のデータは読めない）
  const myBet = rd.bets?.[S.uid];
  if (myBet) {
    const p = await dbGet(`players/${S.uid}`); if (!p) return;
    let win = 0;
    for (const [t, a] of Object.entries(myBet.bets || {})) win += calcRouletteWin(t, result, a);
    win = r(win);
    await dbUpdate(`players/${S.uid}`, {
      coins:       r((p.coins || 0) + win),
      rouletteBet: Math.max(0, r((p.rouletteBet || 0) - r(myBet.amount))),
    });
    await dbSet(`roulette/bets/${S.uid}`, null);
    const disp = result === -1 ? '00' : result;
    if (win > 0) showToast(`🎰 ルーレット: ${disp} → +${fmt(win)} COIN獲得！`, 6000);
    else         showToast(`🎰 ルーレット: ${disp} — 残念...`, 4000);
  }
  // next と last は簡易運用時のみ更新（本来は Cloud Functions 推奨）
  if ((rd.next || 0) <= S.now) {
    await dbUpdate('roulette', { next: S.now + 3600000, last: result });
  }
}

async function checkStocks() {
  const stocks = S.stocks; if (!Object.keys(stocks).length) return;
  const p = S.players[S.uid]; if (!p) return;
  for (const [sym, s] of Object.entries(stocks)) {
    if (S.now < (s.nextUpdate || 0)) continue;
    // 自分の保有数だけで簡易計算（他人データは読めないため）
    const ownHeld = p.holdings?.[sym] || 0;
    const ownAsset = r(p.coins||0) + r(p.deposit?.principal||0) + r(p.termDeposit?.principal||0);
    const base = Math.max(ownAsset, 100);
    const ratio = (base + s.price * ownHeld) / base;
    const noise = (Math.random() - 0.5) * 0.06;
    const newPrice = Math.max(1, r(s.price * ratio * (1 + noise)));
    const history = [...(s.history || [s.price]), newPrice].slice(-60);
    await dbUpdate(`stocks/${sym}`, { price: newPrice, history, nextUpdate: S.now + 43200000 });
    showToast(`📊 ${sym} 株価更新: ${fmt(newPrice)} COIN`);
  }
}

// ---- Toast ----
function showToast(msg, ms = 3500) {
  const d = document.createElement('div');
  d.className = 'toast'; d.textContent = msg;
  document.getElementById('toasts').appendChild(d);
  setTimeout(() => d.remove(), ms);
}

// ---- レンダリング ----
let rendering = false;
function render() {
  if (rendering) return;
  rendering = true;
  try { _render(); } finally { rendering = false; }
}

function _render() {
  const app = document.getElementById('app'); if (!app) return;
  if (!S.uid) { app.innerHTML = renderLogin(); bindLogin(); return; }
  const p = S.players[S.uid];
  if (!p) { app.innerHTML = `<div style="padding:40px;text-align:center;color:#888">データ読み込み中...</div>`; return; }

  const tabs = [
    { id: 'home',     icon: '🏠', label: 'ホーム' },
    { id: 'deposit',  icon: '🏦', label: '預金' },
    { id: 'roulette', icon: '🎰', label: 'ルーレット' },
    { id: 'invest',   icon: '📈', label: '投資' },
    { id: 'ranking',  icon: '🏆', label: 'ランキング' },
  ];
  let content = '';
  if (S.tab === 'home')     content = renderHome(p);
  if (S.tab === 'deposit')  content = renderDeposit(p);
  if (S.tab === 'roulette') content = renderRoulette(p);
  if (S.tab === 'invest')   content = renderInvest(p);
  if (S.tab === 'ranking')  content = renderRanking(p);

  app.innerHTML = `
    <div class="header">
      <span class="logo">🏛 架空市場</span>
      <span class="spacer"></span>
      <span class="badge badge-dark">${esc(p.name || S.pname)}</span>
      <button class="btn" style="font-size:12px;padding:5px 10px" onclick="W.logout()">ログアウト</button>
    </div>
    <div class="tab-bar">
      ${tabs.map(t => `<button class="tab ${S.tab === t.id ? 'active' : ''}" onclick="W.setTab('${t.id}')">${t.icon} ${t.label}</button>`).join('')}
    </div>
    <div class="panel">${content}</div>
  `;
  bindEvents();
}

const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ---- ホーム ----

      </div>
      <div class="progress-bar" style="margin-bottom:12px">
        <div class="progress-fill" style="width:${totalT}%"></div>
      </div>

      <div class="ticket-section">
        <div class="ticket-row">
          <span class="ticket-label">🎟 チケット（×1 COIN）</span>

        </div>
      </div>

      <div class="ticket-section" style="margin-top:10px">
        <div class="ticket-row">
          <span class="ticket-label">★ レアチケット（×1〜10 COIN）</span>
          <span class="badge badge-gold">${maxRare}枚</span>
        </div>

      <span class="hint-label">🏦 普通預金</span><span class="spacer"></span>

// ---- ルーレット ----
function renderRoulette(p) {
  const rd  = S.roulette;
  const now = S.now;
  const timeLeft = rd ? Math.max(0, rd.next - now) : 0;
  const pct  = rd ? Math.min(100, (1 - timeLeft / 3600000) * 100) : 0;
  const mins = Math.floor(timeLeft / 60000);
  const secs = Math.floor((timeLeft % 60000) / 1000);
  const myBetObj = rd?.bets?.[S.uid];
  const bets = S.rbets;
  const betTotal = r(Object.values(bets).reduce((a, b) => a + b, 0));

  const numRows = (() => {
    let html = '';
    for (let row = 0; row < 3; row++) {
      let cells = '';
      for (let col = 0; col < 12; col++) {
        const n = col * 3 + (3 - row);
        const cls = isRed(n) ? 'r-red' : 'r-black';
        cells += `<div class="r-cell ${cls} ${bets['num_'+n]?'sel':''}" onclick="W.toggleBet('num_${n}')">${n}</div>`;
      }
      html += `<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:2px">${cells}</div>`;
    }
    return html;
  })();

  return `
    <div class="card">
      <div class="row" style="margin-bottom:6px">
        <span class="card-title" style="margin:0">🎰 アメリカンルーレット</span>
        <span class="spacer"></span>
        <span class="hint">${timeLeft<500?'🔴 開催中！':`${mins}分${secs}秒後`}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${rd?.last!=null?`<div class="hint" style="margin-top:6px">前回の結果: <strong>${rd.last===-1?'00':rd.last}</strong></div>`:''}
    </div>

    ${myBetObj?`<div class="card">
      <div class="row"><span style="font-weight:700">📌 ベット済み</span><span class="spacer"></span>
      <span class="badge badge-red">${fmt(r(myBetObj.amount))} COIN</span></div>
      <div class="hint" style="margin-top:4px">${Object.entries(myBetObj.bets||{}).map(([k,v])=>`${k}: ${r(v)}C`).join(' | ')}</div>
    </div>`:''}

    <div class="card">
      <div class="row" style="margin-bottom:8px">
        <span style="font-weight:700;font-size:13px">ベット額（箇所ごと）</span>
        <input class="input" id="bet-amt" type="number" min="1" value="${S.rbetAmt}" style="width:70px;margin-left:4px" />
        <span class="hint">COIN</span>
        <span class="spacer"></span>
        ${betTotal>0?`<span class="badge badge-red">計 ${fmt(betTotal)} C</span>`:''}
      </div>

      <div style="display:grid;grid-template-columns:38px 1fr;gap:3px;margin-bottom:3px">
        <div style="display:flex;flex-direction:column;gap:2px">
          <div class="r-cell r-green ${bets['num_0']?'sel':''}" onclick="W.toggleBet('num_0')"
               style="flex:1;display:flex;align-items:center;justify-content:center">0</div>
          <div class="r-cell r-green ${bets['num_-1']?'sel':''}" onclick="W.toggleBet('num_-1')"
               style="flex:1;display:flex;align-items:center;justify-content:center">00</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:2px">${numRows}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:4px">
        ${[['col1','列1 (3:1)'],['col2','列2 (3:1)'],['col3','列3 (3:1)']].map(([c,l])=>
          `<div class="r-cell r-out ${bets[c]?'sel':''}" onclick="W.toggleBet('${c}')">${l}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:3px">
        ${[['doz1','1〜12 (3:1)'],['doz2','13〜24 (3:1)'],['doz3','25〜36 (3:1)']].map(([c,l])=>
          `<div class="r-cell r-out ${bets[c]?'sel':''}" onclick="W.toggleBet('${c}')">${l}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-top:3px">
        ${[['low','1〜18'],['even','偶数'],['red','赤'],['black','黒'],['odd','奇数'],['high','19〜36']].map(([c,l])=>
          `<div class="r-cell r-out ${bets[c]?'sel':''}" onclick="W.toggleBet('${c}')">${l}</div>`).join('')}
      </div>
      <div class="row" style="margin-top:10px;flex-wrap:wrap;gap:6px">
        <button class="btn btn-primary" onclick="W.placeBet()" ${betTotal<=0?'disabled':''}>ベット確定 (${fmt(betTotal)} COIN)</button>
        <button class="btn" onclick="W.clearBets()">クリア</button>
        <span class="hint">手持ち: ${fmt(r(p.coins||0))} C | 数字36倍 / 赤黒偶奇高低2倍 / 列ダズン3倍</span>
      </div>
    </div>
  `;
}

// ---- 投資 ----
function renderInvest(p) {
  let html = `<div class="hint" style="margin-bottom:10px">★ 株価は12時間ごとに更新（取引量が価格変動に影響）</div>`;
  for (const [sym, s] of Object.entries(S.stocks)) {
    const held = r(p.holdings?.[sym] || 0);
    const hist = s.history || [s.price];
    const prev = hist.length > 1 ? hist[hist.length-2] : s.price;
    const chg  = r(s.price) - r(prev);
    const pts  = (() => {
      const mn = Math.min(...hist), mx = Math.max(...hist), rng = mx - mn || 1;
      return hist.map((v,i) => `${i/(hist.length-1||1)*200},${36-(v-mn)/rng*30}`).join(' ');
    })();
    const hLeft = Math.max(0, Math.floor(((s.nextUpdate||0)-S.now)/3600000));
    const mLeft = Math.max(0, Math.floor((((s.nextUpdate||0)-S.now)%3600000)/60000));
    html += `<div class="card">
      <div class="row" style="margin-bottom:4px">
        <span style="font-weight:800;font-size:14px">${esc(sym)}</span>
        <span class="hint" style="margin-left:2px">${esc(s.name)}</span>
        <span class="spacer"></span>
        <span style="font-weight:700;font-size:16px">${fmt(r(s.price))} C</span>
        <span class="${chg>=0?'price-up':'price-down'}" style="font-size:12px">${chg>=0?'+':''}${fmt(chg)}</span>
      </div>
      <svg viewBox="0 0 200 40" style="width:100%;height:44px;display:block;margin-bottom:5px">
        <polyline points="${pts}" fill="none" stroke="${chg>=0?'#1d9e75':'#c0392b'}" stroke-width="1.5"/>
      </svg>
      <div class="hint" style="margin-bottom:8px">次回更新まで ${hLeft}時間${mLeft}分 | 保有: ${held}株 (≈${fmt(r(held*s.price))} C)</div>
      <div class="row" style="flex-wrap:wrap;gap:6px">
        <input class="input" id="buy-${sym}" type="number" min="1" placeholder="株数" value="${S.buyAmt[sym]||''}" style="width:80px" />
        <button class="btn btn-primary" onclick="W.buyStock('${esc(sym)}')">買う</button>
        ${held>0?`
          <input class="input" id="sell-${sym}" type="number" min="1" max="${held}" placeholder="株数" value="${S.sellAmt[sym]||''}" style="width:80px" />
          <button class="btn btn-danger" onclick="W.sellStock('${esc(sym)}')">売る</button>
        `:''}
        <span class="hint">手持ち: ${fmt(r(p.coins||0))} C</span>
      </div>
    </div>`;
  }
  return html;
}

// ---- イベントバインド ----
function bindLogin() {
  ['l-name','l-email','l-pass'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.oninput = e => {
      if (id === 'l-name')  S.lname  = e.target.value;
      if (id === 'l-email') S.lemail = e.target.value;
      if (id === 'l-pass')  S.lpass  = e.target.value;
    };
    if (id === 'l-pass') el.onkeydown = e => { if (e.key === 'Enter') W.login(); };
  });
}
function bindEvents() {
  const map = [
    ['dep-in','depAmt'],['dep-add','depAmt'],
    ['tdep-in','tdepAmt'],['tdep-days','tdepDays'],
    ['bet-amt','rbetAmt'],
    ['conv-n','ticketConvertAmt'],['conv-r','rareConvertAmt'],
  ];
  for (const [id, key] of map) {
    const el = document.getElementById(id);
    if (el) el.oninput = e => { S[key] = e.target.value; render(); };
  }
  for (const sym of Object.keys(S.stocks)) {
    const b = document.getElementById('buy-'+sym);  if (b) b.oninput = e => S.buyAmt[sym]  = e.target.value;
    const s = document.getElementById('sell-'+sym); if (s) s.oninput = e => S.sellAmt[sym] = e.target.value;
  }
}

// ---- ランキング用メタを自分の分だけ更新 ----
async function pushMyMeta(p) {
  if (!S.uid) return;
  const rt = rankTotal(p);
  await dbUpdate(`playersMeta/${S.uid}`, {
    name: p.name || S.pname,
    rankTotal: rt,
    detail: {
      coins: r(p.coins||0),
      dep:   p.deposit     ? r(p.deposit.principal)     : 0,
      tdep:  p.termDeposit ? r(p.termDeposit.principal) : 0,
      rbet:  r(p.rouletteBet||0),
      inv:   r(p.investedCost||0),
    }
  });
}

// ---- 公開API ----
window.W = {
  setTab(t) { S.tab = t; render(); },
  setMode(m) { S.lmode = m; S.lerr = ''; render(); },
  setConvN(n) { S.ticketConvertAmt = String(n); render(); },
  setConvR(n) { S.rareConvertAmt  = String(n); render(); },

  async login() {
    const email = document.getElementById('l-email')?.value.trim();
    const pass  = document.getElementById('l-pass')?.value.trim();
    const name  = document.getElementById('l-name')?.value.trim();
    if (!email || !pass) { S.lerr = 'メールアドレスとパスワードを入力してください'; render(); return; }
    if (S.lmode === 'register' && !name) { S.lerr = 'プレイヤー名を入力してください'; render(); return; }
    try {
      if (S.lmode === 'register') {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const uid  = cred.user.uid;
        const now  = Date.now();
        const newP = { id: uid, name, coins: 0, tickets: 0, rareTickets: 0, lastTicketTime: now,
                       deposit: null, depositBalance: 0, termDeposit: null, termDepositBalance: 0,
                       rouletteBet: 0, holdings: {}, investedCost: 0 };
        await dbSet(`players/${uid}`, newP);
        await pushMyMeta(newP);
        showToast(`ようこそ、${name}さん！`);
      } else {
        await signInWithEmailAndPassword(auth, email, pass);
        showToast('ログインしました');
      }
      S.lerr = ''; S.tab = 'home';
    } catch(e) {
      const msg = { 'auth/email-already-in-use':'そのメールは既に登録されています',
                    'auth/invalid-email':'メールアドレスの形式が正しくありません',
                    'auth/weak-password':'パスワードは6文字以上にしてください',
                    'auth/invalid-credential':'メールアドレスまたはパスワードが間違っています',
                    'auth/user-not-found':'アカウントが見つかりません',
                    'auth/wrong-password':'パスワードが間違っています' }[e.code] || e.message;
      S.lerr = msg; render();
    }
  },

  async logout() {
    await signOut(auth);
    S.uid = null; S.pname = ''; S.tab = 'home';
    Object.values(unsubs).forEach(u => u && u());
    render();
  },

  async useTicket(type) {
    const p = await dbGet(`players/${S.uid}`); if (!p) return;
    if (type === 'normal') {
      const n = Math.max(1, Math.min(parseInt(S.ticketConvertAmt)||1, p.tickets||0));
      if ((p.tickets||0) < 1) { showToast('チケットがありません'); return; }
      const gain = n;
      const upd = { tickets: (p.tickets||0) - n, coins: r((p.coins||0) + gain) };
      await dbUpdate(`players/${S.uid}`, upd);
      await pushMyMeta({ ...p, ...upd });
      showToast(`+${fmt(gain)} COIN 獲得！（${n}枚使用）`);
      S.ticketConvertAmt = '1';
    } else {
      const n = Math.max(1, Math.min(parseInt(S.rareConvertAmt)||1, p.rareTickets||0));
      if ((p.rareTickets||0) < 1) { showToast('レアチケットがありません'); return; }
      let gain = 0;
      for (let i = 0; i < n; i++) gain += Math.floor(Math.random() * 10) + 1;
      const upd = { rareTickets: (p.rareTickets||0) - n, coins: r((p.coins||0) + gain) };
      await dbUpdate(`players/${S.uid}`, upd);
      await pushMyMeta({ ...p, ...upd });
      showToast(`★ レアチケット${n}枚使用！ +${fmt(gain)} COIN！`);
      S.rareConvertAmt = '1';
    }
  },

  async doDeposit() {
    const amt = r(parseFloat(document.getElementById('dep-in')?.value)||0);
    if (amt <= 0) { showToast('金額を入力してください'); return; }
    const p = await dbGet(`players/${S.uid}`);
    if (amt > r(p.coins||0)) { showToast('COINが不足しています'); return; }
    const upd = { coins: r((p.coins||0)-amt), deposit: { principal: amt, since: Date.now() }, depositBalance: amt };
    await dbUpdate(`players/${S.uid}`, upd);
    await pushMyMeta({ ...p, ...upd });
    S.depAmt = ''; showToast(`${fmt(amt)} COINを預金しました`);
  },

  async addDeposit() {
    const amt = r(parseFloat(document.getElementById('dep-add')?.value)||0);
    if (amt <= 0) { showToast('金額を入力してください'); return; }
    const p = await dbGet(`players/${S.uid}`);
    if (amt > r(p.coins||0)) { showToast('COINが不足しています'); return; }
    const now = Date.now();
    const curBal = r(p.deposit.principal * Math.pow(1.01, (now-p.deposit.since)/86400000));
    const np = r(curBal + amt);
    const upd = { coins: r((p.coins||0)-amt), deposit: { principal: np, since: now }, depositBalance: np };
    await dbUpdate(`players/${S.uid}`, upd);
    await pushMyMeta({ ...p, ...upd });
    S.depAmt = ''; showToast(`${fmt(amt)} COINを追加預金しました`);
  },

  async withdrawDeposit() {
    const p = await dbGet(`players/${S.uid}`); if (!p?.deposit) return;
    const bal = r(p.deposit.principal * Math.pow(1.01, (Date.now()-p.deposit.since)/86400000));
    const upd = { coins: r((p.coins||0)+bal), deposit: null, depositBalance: 0 };
    await dbUpdate(`players/${S.uid}`, upd);
    await pushMyMeta({ ...p, ...upd });
    showToast(`${fmt(bal)} COINを引き出しました`);
  },

  async doTermDeposit() {
    const amt  = r(parseFloat(document.getElementById('tdep-in')?.value)||0);
    const days = parseInt(document.getElementById('tdep-days')?.value)||7;
    if (amt <= 0) { showToast('金額を入力してください'); return; }
    if (days < 7) { showToast('7日以上を指定してください'); return; }
    const p = await dbGet(`players/${S.uid}`);
    if (p.termDeposit?.principal > 0) { showToast('既に定期預金があります'); return; }
    if (amt > r(p.coins||0)) { showToast('COINが不足しています'); return; }
    const upd = { coins: r((p.coins||0)-amt), termDeposit: { principal: amt, since: Date.now(), days }, termDepositBalance: amt };
    await dbUpdate(`players/${S.uid}`, upd);
    await pushMyMeta({ ...p, ...upd });
    S.tdepAmt = ''; showToast(`${fmt(amt)} COINを${days}日間定期預金しました`);
  },

  async withdrawTermDeposit() {
    const p = await dbGet(`players/${S.uid}`); if (!p?.termDeposit) return;
    const elapsed = (Date.now()-p.termDeposit.since)/86400000;
    const matured = elapsed >= p.termDeposit.days;
    const ret = matured ? r(p.termDeposit.principal*Math.pow(1.02,elapsed)) : r(p.termDeposit.principal);
    const upd = { coins: r((p.coins||0)+ret), termDeposit: null, termDepositBalance: 0 };
    await dbUpdate(`players/${S.uid}`, upd);
    await pushMyMeta({ ...p, ...upd });
    showToast(matured ? `定期満期！ ${fmt(ret)} COIN返還` : `期限前解約。元本 ${fmt(ret)} COIN返還`);
  },

  toggleBet(type) {
    const amt = Math.max(1, r(parseFloat(S.rbetAmt)||1));
    if (S.rbets[type]) delete S.rbets[type]; else S.rbets[type] = amt;
    render();
  },
  clearBets() { S.rbets = {}; render(); },

  async placeBet() {
    const total = r(Object.values(S.rbets).reduce((a,b)=>a+b,0));
    if (total <= 0) { showToast('賭け箇所を選んでください'); return; }
    const p = await dbGet(`players/${S.uid}`);
    if (total > r(p.coins||0)) { showToast('COINが不足しています'); return; }
    const rd = await dbGet('roulette') || { next: Date.now()+3600000, bets: {} };
    const ex = rd.bets?.[S.uid];
    let newBets, newAmt;
    if (ex) {
      newBets = { ...ex.bets };
      for (const [k,v] of Object.entries(S.rbets)) newBets[k] = r((newBets[k]||0)+v);
      newAmt  = r((ex.amount||0)+total);
    } else {
      newBets = { ...S.rbets };
      newAmt  = total;
    }
    await dbSet(`roulette/bets/${S.uid}`, { playerId: S.uid, bets: newBets, amount: newAmt });
    const upd = { coins: r((p.coins||0)-total), rouletteBet: r((p.rouletteBet||0)+total) };
    await dbUpdate(`players/${S.uid}`, upd);
    await pushMyMeta({ ...p, ...upd });
    S.rbets = {}; S.rbetAmt = '1';
    showToast(`${fmt(total)} COINをベット確定！`);
  },

  async buyStock(sym) {
    const qty = r(parseFloat(document.getElementById('buy-'+sym)?.value)||0);
    if (qty <= 0) { showToast('株数を入力してください'); return; }
    const s = S.stocks[sym]; if (!s) return;
    const cost = r(s.price * qty);
    const p = await dbGet(`players/${S.uid}`);
    if (cost > r(p.coins||0)) { showToast('COINが不足しています'); return; }
    const holdings = { ...(p.holdings||{}) };
    holdings[sym] = r((holdings[sym]||0)+qty);
    const upd = { coins: r((p.coins||0)-cost), holdings, investedCost: r((p.investedCost||0)+cost) };
    await dbUpdate(`players/${S.uid}`, upd);
    await pushMyMeta({ ...p, ...upd });
    S.buyAmt[sym] = ''; showToast(`${sym} ${qty}株を購入 (-${fmt(cost)} COIN)`);
  },

  async sellStock(sym) {
    const qty = r(parseFloat(document.getElementById('sell-'+sym)?.value)||0);
    if (qty <= 0) { showToast('株数を入力してください'); return; }
    const p = await dbGet(`players/${S.uid}`);
    if ((p.holdings?.[sym]||0) < qty) { showToast('保有数が不足しています'); return; }
    const s = S.stocks[sym]; if (!s) return;
    const rev = r(s.price * qty);
    const totalHeld = Object.values(p.holdings||{}).reduce((a,b)=>a+b,0);
    const avgCost = totalHeld > 0 ? (p.investedCost||0)/totalHeld : 0;
    const holdings = { ...(p.holdings||{}) };
    holdings[sym] = r((holdings[sym]||0)-qty);
    const upd = {
      coins: r((p.coins||0)+rev), holdings,
      investedCost: Math.max(0, r((p.investedCost||0)-r(avgCost*qty)))
    };
    await dbUpdate(`players/${S.uid}`, upd);
    await pushMyMeta({ ...p, ...upd });
    S.sellAmt[sym] = ''; showToast(`${sym} ${qty}株を売却 (+${fmt(rev)} COIN)`);
  },
};

// ---- 起動 ----
async function main() {
  await ensureDefaults();
  onAuthStateChanged(auth, async user => {
    if (user) {
      S.uid = user.uid;
      const p = await dbGet(`players/${S.uid}`);
      if (p) { S.pname = p.name; await pushMyMeta(p); }
      subscribeAll(S.uid);
      setInterval(periodicCheck, 10000);
    } else {
      S.uid = null; S.pname = '';
      render();
    }
  });
  setInterval(() => { S.now = Date.now(); render(); }, 1000);
}

main().catch(e => {
  console.error(e);
  document.getElementById('app').innerHTML =
    `<div style="padding:40px;font-family:system-ui;color:#c0392b">
       <h2>起動エラー</h2>
       <p style="margin-top:8px;color:#444">${e.message}</p>
     </div>`;
});
</script>
