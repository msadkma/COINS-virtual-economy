  1. https://console.firebase.google.com/ でプロジェクトを作成
  2. 「Realtime Database」を有効化（テストモードで開始）
  3. 「プロジェクトの設定」→「マイアプリ」→「ウェブアプリ」を追加
  4. 表示されたfirebaseConfigの値を下記 FIREBASE_CONFIG に貼り付け
  5. このHTMLファイルをブラウザで開けばOK（ローカルでも動作します）

  【Realtime Databaseのルール設定（本番用）】
  {
    "rules": {
      ".read": "auth == null",
      ".write": "auth == null"
    }
  }
  ※認証なしで動作させる簡易設定です。
    より安全にしたい場合はFirebase Authを導入してください。
======================================================== -->

<script type="module">

//  ★ここにFirebaseの設定を貼り付けてください★
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAoldTnCCTDdIGMA_Q3zeEf8fNGmZWPo7g",
  authDomain: "unreal-economic-platform.firebaseapp.com",
  databaseURL: "https://unreal-economic-platform-default-rtdb.firebaseio.com/",
  projectId: "unreal-economic-platform",
  storageBucket: "unreal-economic-platform.firebasestorage.app",
  messagingSenderId: "169831544038",
  appId: "1:169831544038:web:04e3d06b74be5df7057727",
  measurementId: "G-TZ6F7Y6RDD"
};
// ============================================================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, update, onValue, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ---- Firebase初期化 ----
let db;
try {
  const app = initializeApp(FIREBASE_CONFIG);
  db = getDatabase(app);
} catch(e) {
  document.getElementById('app').innerHTML = `
    <div style="padding:40px;max-width:500px;margin:0 auto;font-family:system-ui">
      <h2 style="color:#c0392b;margin-bottom:12px">⚠ Firebase未設定</h2>
      <p style="color:#444;line-height:1.7;margin-bottom:12px">
        このファイルの先頭にある <code>FIREBASE_CONFIG</code> に、
        Firebaseコンソールで取得した設定値を貼り付けてください。
      </p>
      <p style="font-size:13px;color:#888">エラー: ${e.message}</p>
    </div>`;
  throw e;
}

// ---- DB参照ヘルパー ----
const dbGet = async path => { const s = await get(ref(db, path)); return s.exists() ? s.val() : null; };
const dbSet = async (path, val) => set(ref(db, path), val);
const dbUpdate = async (path, val) => update(ref(db, path), val);

// ---- 定数 ----
const RED = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
const isRed = n => RED.includes(n);
const isBlack = n => !isRed(n) && n > 0;
const r = n => Math.round(n);
const fmt = n => r(n).toLocaleString('ja-JP');

// ---- State ----
const S = {
  tab: 'home', pid: null, pname: '',
  players: {}, roulette: null, stocks: {},
  lmode: 'login', lname: '', lpass: '', lerr: '',
  depAmt: '', tdepAmt: '', tdepDays: '7',
  rbets: {}, rbetAmt: '1',
  buyAmt: {}, sellAmt: {},
  now: Date.now(),
  unsubRoulette: null, unsubStocks: null, unsubPlayers: null,
};

// ---- Firebase リアルタイム購読 ----
function subscribeAll() {
  // players
  const pRef = ref(db, 'players');
  if (S.unsubPlayers) off(pRef);
  S.unsubPlayers = onValue(pRef, snap => {
    S.players = snap.val() || {};
    render();
  });
  // roulette
  const rRef = ref(db, 'roulette');
  if (S.unsubRoulette) off(rRef);
  S.unsubRoulette = onValue(rRef, snap => {
    S.roulette = snap.val();
    render();
  });
  // stocks
  const sRef = ref(db, 'stocks');
  if (S.unsubStocks) off(sRef);
  S.unsubStocks = onValue(sRef, snap => {
    S.stocks = snap.val() || {};
    render();
  });
}

// ---- 初期データ作成 ----
async function ensureDefaults() {
  const rd = await dbGet('roulette');
  if (!rd) {
    await dbSet('roulette', { next: Date.now() + 3600000, bets: {}, last: null });
  }
  const sd = await dbGet('stocks');
  if (!sd) {
    const now = Date.now();
    await dbSet('stocks', {
      ALPHA: { name: 'Alpha Corp', price: 100, history: [100], nextUpdate: now + 43200000 },
      BETA:  { name: 'Beta Inc',   price: 80,  history: [80],  nextUpdate: now + 43200000 },
      GAMMA: { name: 'Gamma Ltd',  price: 50,  history: [50],  nextUpdate: now + 43200000 },
    });
  }
}

// ---- 利息計算 ----
function applyInterestLocal(p) {
  const now = Date.now();
  if (p.deposit && p.deposit.principal > 0) {
    const days = (now - (p.deposit.since || now)) / 86400000;
    p.depositBalance = p.deposit.principal * Math.pow(1.01, days);
  }
  if (p.termDeposit && p.termDeposit.principal > 0) {
    const days = (now - (p.termDeposit.since || now)) / 86400000;
    p.termDepositBalance = p.termDeposit.principal * Math.pow(1.02, days);
  }
  return p;
}

// ---- ランキング基準総資産 ----
function rankTotal(p) {
  return r((p.coins || 0)
    + (p.deposit ? p.deposit.principal || 0 : 0)
    + (p.termDeposit ? p.termDeposit.principal || 0 : 0)
    + (p.rouletteBet || 0)
    + (p.investedCost || 0));
}

// ---- ルーレット払い戻し計算 ----
function calcRouletteWin(type, result, amt) {
  const a = r(amt);
  const n = result; // -1 = 00
  if (type.startsWith('num_')) {
    const t = parseInt(type.slice(4));
    return t === n ? a * 36 : 0;
  }
  if (type === 'red')   return (n > 0 && isRed(n))   ? a * 2 : 0;
  if (type === 'black') return (n > 0 && isBlack(n)) ? a * 2 : 0;
  if (type === 'even')  return (n > 0 && n % 2 === 0) ? a * 2 : 0;
  if (type === 'odd')   return (n > 0 && n % 2 !== 0) ? a * 2 : 0;
  if (type === 'low')   return (n >= 1 && n <= 18) ? a * 2 : 0;
  if (type === 'high')  return (n >= 19 && n <= 36) ? a * 2 : 0;
  if (type === 'col1')  return (n > 0 && n % 3 === 1) ? a * 3 : 0;
  if (type === 'col2')  return (n > 0 && n % 3 === 2) ? a * 3 : 0;
  if (type === 'col3')  return (n > 0 && n % 3 === 0) ? a * 3 : 0;
  if (type === 'doz1')  return (n >= 1  && n <= 12) ? a * 3 : 0;
  if (type === 'doz2')  return (n >= 13 && n <= 24) ? a * 3 : 0;
  if (type === 'doz3')  return (n >= 25 && n <= 36) ? a * 3 : 0;
  return 0;
}

// ---- 定期チェック ----
let checking = false;
async function periodicCheck() {
  S.now = Date.now();
  if (!S.pid || checking) return;
  checking = true;
  try {
    await checkTickets();
    await checkRoulette();
    await checkStocks();
  } finally {
    checking = false;
  }
}

async function checkTickets() {
  const p = (await dbGet(`players/${S.pid}`));
  if (!p) return;
  const elapsed = S.now - (p.lastTicketTime || S.now);
  const newT = Math.floor(elapsed / 60000);
  if (newT <= 0) return;
  const avail = 100 - (p.tickets || 0) - (p.rareTickets || 0);
  if (avail <= 0) {
    await dbUpdate(`players/${S.pid}`, { lastTicketTime: (p.lastTicketTime || S.now) + newT * 60000 });
    return;
  }
  let nr = 0, nn = 0;
  const add = Math.min(newT, avail);
  for (let i = 0; i < add; i++) { if (Math.random() < 0.1) nr++; else nn++; }
  const upd = {
    tickets: (p.tickets || 0) + nn,
    rareTickets: (p.rareTickets || 0) + nr,
    lastTicketTime: (p.lastTicketTime || S.now) + newT * 60000,
  };
  await dbUpdate(`players/${S.pid}`, upd);
  if (nr > 0) showToast(`★ レアチケット×${nr}枚獲得！`);
  else if (nn > 0) showToast(`チケット×${nn}枚獲得`);
}

async function checkRoulette() {
  const rd = await dbGet('roulette');
  if (!rd || S.now < rd.next) return;
  const result = (() => { const n = Math.floor(Math.random() * 38); return n === 37 ? -1 : n; })();
  const bets = rd.bets ? Object.values(rd.bets) : [];
  for (const bet of bets) {
    const p = await dbGet(`players/${bet.playerId}`);
    if (!p) continue;
    const debit = r(bet.amount);
    let win = 0;
    for (const [t, a] of Object.entries(bet.bets || {})) win += calcRouletteWin(t, result, a);
    win = r(win);
    const newCoins = r((p.coins || 0) + win);
    const newBet = Math.max(0, r((p.rouletteBet || 0) - debit));
    await dbUpdate(`players/${bet.playerId}`, { coins: newCoins, rouletteBet: newBet });
    if (bet.playerId === S.pid) {
      const disp = result === -1 ? '00' : result;
      if (win > 0) showToast(`🎰 ルーレット: ${disp} → +${fmt(win)} COIN獲得！`, 6000);
      else showToast(`🎰 ルーレット: ${disp} — 残念...`, 4000);
    }
  }
  await dbSet('roulette', { next: S.now + 3600000, bets: {}, last: result });
}

async function checkStocks() {
  const stocks = await dbGet('stocks');
  if (!stocks) return;
  const players = Object.values(await dbGet('players') || {});
  let updated = false;
  for (const [sym, s] of Object.entries(stocks)) {
    if (S.now < (s.nextUpdate || 0)) continue;
    let totalAsset = 0;
    for (const p of players) {
      totalAsset += r(p.coins || 0) + r(p.depositBalance || 0) + r(p.termDepositBalance || 0);
    }
    const heldByAll = players.reduce((sum, p) => sum + (p.holdings?.[sym] || 0), 0);
    const base = totalAsset || 1000;
    const ratio = (base + s.price * heldByAll) / base;
    const noise = (Math.random() - 0.5) * 0.06;
    const newPrice = Math.max(1, r(s.price * ratio * (1 + noise)));
    const history = [...(s.history || [s.price]), newPrice].slice(-60);
    await dbUpdate(`stocks/${sym}`, { price: newPrice, history, nextUpdate: S.now + 43200000 });
    updated = true;
  }
  if (updated) showToast('📊 株価が更新されました');
}

// ---- Toast ----
function showToast(msg, ms = 3500) {
  const d = document.createElement('div');
  d.className = 'toast';
  d.textContent = msg;
  document.getElementById('toasts').appendChild(d);
  setTimeout(() => d.remove(), ms);
}

// ---- レンダリング ----
let rendering = false;
function render() {
  if (rendering) return;
  rendering = true;
  try {
    const app = document.getElementById('app');
    if (!app) return;
    if (!S.pid) { app.innerHTML = renderLogin(); bindLogin(); return; }
    const rawP = S.players[S.pid];
    if (!rawP) { S.pid = null; sessionStorage.removeItem('fm_sess'); render(); return; }
    const p = applyInterestLocal({ ...rawP });

    const tabs = [
      { id: 'home', icon: '🏠', label: 'ホーム' },
      { id: 'deposit', icon: '🏦', label: '預金' },
      { id: 'roulette', icon: '🎰', label: 'ルーレット' },
      { id: 'invest', icon: '📈', label: '投資' },
      { id: 'ranking', icon: '🏆', label: 'ランキング' },
    ];
    let content = '';
    if (S.tab === 'home')     content = renderHome(p);
    if (S.tab === 'deposit')  content = renderDeposit(p);
    if (S.tab === 'roulette') content = renderRoulette(p);
    if (S.tab === 'invest')   content = renderInvest(p);
    if (S.tab === 'ranking')  content = renderRanking();

    app.innerHTML = `
      <div class="header">
        <span class="logo">🏛 COINS架空市場</span>
        <span class="spacer"></span>
        <span class="badge badge-dark">${p.name}</span>
        <button class="btn" style="font-size:12px;padding:5px 10px" onclick="W.logout()">ログアウト</button>
      </div>
      <div class="tab-bar">
        ${tabs.map(t => `<button class="tab ${S.tab === t.id ? 'active' : ''}" onclick="W.setTab('${t.id}')">${t.icon} ${t.label}</button>`).join('')}
      </div>
      <div class="panel">${content}</div>
    `;
    bindEvents(p);
  } finally {
    rendering = false;
  }
}

function renderHome(p) {
  const now = S.now;
  const elapsed = now - (p.lastTicketTime || now);
  const nextIn = Math.max(0, 60000 - elapsed % 60000);
  const totalT = (p.tickets || 0) + (p.rareTickets || 0);

  const depBal = p.deposit ? r(p.deposit.principal * Math.pow(1.01, (now - (p.deposit.since || now)) / 86400000)) : 0;
  const tdepBal = p.termDeposit ? r(p.termDeposit.principal * Math.pow(1.02, (now - (p.termDeposit.since || now)) / 86400000)) : 0;
  let invVal = 0;
  for (const [sym, qty] of Object.entries(p.holdings || {})) {
    if (S.stocks[sym]) invVal += S.stocks[sym].price * (qty || 0);

  invVal = r(invVal);
  const total = r((p.coins || 0) + depBal + tdepBal + (p.rouletteBet || 0) + invVal);

  return `
    <div class="metrics">
      <div class="metric"><div class="metric-label">手持ち</div><div class="metric-val">${fmt(r(p.coins||0))}<span class="mu"> C</span></div></div>
      <div class="metric"><div class="metric-label">総資産(評価)</div><div class="metric-val">${fmt(total)}<span class="mu"> C</span></div></div>
      <div class="metric"><div class="metric-label">チケット</div><div class="metric-val">${p.tickets||0}<span class="mu">枚</span></div></div>
      <div class="metric"><div class="metric-label" style="color:#7a5c00">★ レア</div><div class="metric-val" style="color:#7a5c00">${p.rareTickets||0}<span class="mu">枚</span></div></div>
    </div>
    <div class="card">
      <div class="row" style="margin-bottom:7px">
        <span class="card-title" style="margin:0">チケット</span>
        <span class="spacer"></span>
        <span class="hint">${totalT}/100枚 | 次のチケット: ${secLeft}秒後</span>
      </div>
      <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" style="width:${totalT}%"></div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" style="flex:1;min-width:140px" onclick="W.useTicket('normal')" ${(p.tickets||0)<1?'disabled':''}>チケット使用 → +1 COIN</button>
        <button class="btn btn-gold" style="flex:1;min-width:140px" onclick="W.useTicket('rare')" ${(p.rareTickets||0)<1?'disabled':''}>★ レア使用 → 1〜10 COIN</button>
      </div>
    </div>
    ${p.deposit&&p.deposit.principal>0?`<div class="card"><div class="row"><span class="hint-label">普通預金</span><span class="spacer"></span><span class="badge badge-blue">${fmt(depBal)} COIN</span></div><div class="hint" style="margin-top:3px">元本 ${fmt(r(p.deposit.principal))} C | 利率 1%/日（複利）</div></div>`:''}
    ${p.termDeposit&&p.termDeposit.principal>0?`<div class="card"><div class="row"><span class="hint-label">定期預金</span><span class="spacer"></span><span class="badge badge-purple">${fmt(tdepBal)} COIN</span></div><div class="hint" style="margin-top:3px">元本 ${fmt(r(p.termDeposit.principal))} C | 利率 2%/日 | ${p.termDeposit.days}日満期</div></div>`:''}
    ${(p.rouletteBet||0)>0?`<div class="card"><div class="row"><span class="hint-label">ルーレット待機中</span><span class="spacer"></span><span class="badge badge-red">${fmt(r(p.rouletteBet))} COIN</span></div></div>`:''}
    ${invVal>0?`<div class="card"><div class="row"><span class="hint-label">投資評価額</span><span class="spacer"></span><span class="badge badge-green">${fmt(invVal)} COIN</span></div></div>`:''}
  `;
}

function renderRoulette(p) {
  const rd = S.roulette;
  const now = S.now;
  const timeLeft = rd ? Math.max(0, rd.next - now) : 0;
  const pct = rd ? Math.min(100, (1 - timeLeft / 3600000) * 100) : 0;
  const mins = Math.floor(timeLeft / 60000);
  const secs = Math.floor((timeLeft % 60000) / 1000);
  const myBetObj = rd && rd.bets ? Object.values(rd.bets).find(b => b.playerId === S.pid) : null;
  const bets = S.rbets;
  const betTotal = r(Object.values(bets).reduce((a, b) => a + b, 0));

  const numRows = (() => {
    let html = '';
    for (let row = 0; row < 3; row++) {
      let cells = '';
      for (let col = 0; col < 12; col++) {
        const n = col * 3 + (3 - row);
        const cls = isRed(n) ? 'r-red' : 'r-black';
        const sel = bets['num_' + n] ? 'sel' : '';
        cells += `<div class="r-cell ${cls} ${sel}" onclick="W.toggleBet('num_${n}')">${n}</div>`;
      }
      html += `<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:2px">${cells}</div>`;
    }
    return html;
  })();

  return `
    <div class="card">
      <div class="row" style="margin-bottom:6px">
        <span class="card-title" style="margin:0">🎰 アメリカンルーレット</span>
        <span class="spacer"></span>
        <span class="hint">${timeLeft < 500 ? '🔴 開催中！' : `${mins}分${secs}秒後`}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${rd && rd.last != null ? `<div class="hint" style="margin-top:6px">前回の結果: <strong>${rd.last === -1 ? '00' : rd.last}</strong></div>` : ''}
    </div>
    ${myBetObj ? `<div class="card"><div class="row"><span style="font-weight:600">📌 ベット済み</span><span class="spacer"></span><span class="badge badge-red">${fmt(r(myBetObj.amount))} COIN</span></div><div class="hint" style="margin-top:4px">${Object.entries(myBetObj.bets||{}).map(([k,v])=>`${k}: ${r(v)}C`).join(' | ')}</div></div>` : ''}
    <div class="card">
      <div class="row" style="margin-bottom:8px">
        <span style="font-weight:600;font-size:13px">ベット額（箇所ごと）</span>
        <input class="input" id="bet-amt" type="number" min="1" value="${S.rbetAmt}" style="width:70px;margin-left:4px" />
        <span class="hint">COIN</span>
        <span class="spacer"></span>
        ${betTotal > 0 ? `<span class="badge badge-red">計 ${fmt(betTotal)} C</span>` : ''}
      </div>
      <div style="display:grid;grid-template-columns:38px 1fr;gap:3px;margin-bottom:3px">
        <div style="display:flex;flex-direction:column;gap:2px">
          <div class="r-cell r-green ${bets['num_0']?'sel':''}" onclick="W.toggleBet('num_0')" style="flex:1;display:flex;align-items:center;justify-content:center">0</div>
          <div class="r-cell r-green ${bets['num_-1']?'sel':''}" onclick="W.toggleBet('num_-1')" style="flex:1;display:flex;align-items:center;justify-content:center">00</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:2px">${numRows}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:4px">
        ${[['col1','列1 (3:1)'],['col2','列2 (3:1)'],['col3','列3 (3:1)']].map(([c,l])=>`<div class="r-cell r-out ${bets[c]?'sel':''}" onclick="W.toggleBet('${c}')">${l}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:3px">
        ${[['doz1','1〜12 (3:1)'],['doz2','13〜24 (3:1)'],['doz3','25〜36 (3:1)']].map(([c,l])=>`<div class="r-cell r-out ${bets[c]?'sel':''}" onclick="W.toggleBet('${c}')">${l}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-top:3px">
        ${[['low','1〜18'],['even','偶数'],['red','赤'],['black','黒'],['odd','奇数'],['high','19〜36']].map(([c,l])=>`<div class="r-cell r-out ${bets[c]?'sel':''}" onclick="W.toggleBet('${c}')">${l}</div>`).join('')}
      </div>
      <div class="row" style="margin-top:10px;flex-wrap:wrap;gap:6px">
        <button class="btn btn-primary" onclick="W.placeBet()" ${betTotal <= 0 ? 'disabled' : ''}>ベット確定 (${fmt(betTotal)} COIN)</button>
        <button class="btn" onclick="W.clearBets()">クリア</button>
        <span class="hint">手持ち: ${fmt(r(p.coins||0))} C | 数字36倍 / 赤黒偶奇高低2倍 / 列ダズン3倍</span>
      </div>
    </div>
  `;
}

function renderInvest(p) {
  let html = `<div class="hint" style="margin-bottom:10px">★ 株価は12時間ごとに更新（全プレイヤーの取引量が価格変動に影響）</div>`;
  for (const [sym, s] of Object.entries(S.stocks)) {
    const held = r(p.holdings?.[sym] || 0);
    const hist = s.history || [s.price];
    const prev = hist.length > 1 ? hist[hist.length - 2] : s.price;
    const chg = r(s.price) - r(prev);
    const chgCls = chg >= 0 ? 'price-up' : 'price-down';
    const chgStr = (chg >= 0 ? '+' : '') + fmt(chg);
    const minH = Math.min(...hist), maxH = Math.max(...hist), range = maxH - minH || 1;
    const pts = hist.map((v, i) => `${i / (hist.length - 1 || 1) * 200},${36 - (v - minH) / range * 30}`).join(' ');
    const hLeft = Math.max(0, Math.floor(((s.nextUpdate || 0) - S.now) / 3600000));
    const mLeft = Math.max(0, Math.floor((((s.nextUpdate || 0) - S.now) % 3600000) / 60000));
    html += `<div class="card">
      <div class="row" style="margin-bottom:4px">
        <span style="font-weight:700;font-size:14px">${sym}</span>
        <span class="hint" style="margin-left:2px">${s.name}</span>
        <span class="spacer"></span>
        <span style="font-weight:700;font-size:16px">${fmt(r(s.price))} C</span>
        <span class="${chgCls}" style="font-size:12px">${chgStr}</span>
      </div>
      <svg viewBox="0 0 200 40" style="width:100%;height:44px;display:block;margin-bottom:5px">
        <polyline points="${pts}" fill="none" stroke="${chg>=0?'#1d9e75':'#c0392b'}" stroke-width="1.5"/>
      </svg>
      <div class="hint" style="margin-bottom:8px">次回更新まで ${hLeft}時間${mLeft}分 | 保有: ${held}株 (≈${fmt(r(held * s.price))} C)</div>
      <div class="row" style="flex-wrap:wrap;gap:6px">
        <input class="input" id="buy-${sym}" type="number" min="1" placeholder="株数" value="${S.buyAmt[sym]||''}" style="width:80px" />
        <button class="btn btn-primary" onclick="W.buyStock('${sym}')">買う</button>
        ${held > 0 ? `
          <input class="input" id="sell-${sym}" type="number" min="1" max="${held}" placeholder="株数" value="${S.sellAmt[sym]||''}" style="width:80px" />
          <button class="btn btn-danger" onclick="W.sellStock('${sym}')">売る</button>
        ` : ''}
        <span class="hint">手持ち: ${fmt(r(p.coins||0))} C</span>
      </div>
    </div>`;
  }
  return html;
}

function renderRanking() {
  const players = Object.values(S.players);
  const ranked = players.map(p => {
    let invVal = 0;
    for (const [sym, qty] of Object.entries(p.holdings || {})) {
      if (S.stocks[sym]) invVal += S.stocks[sym].price * (qty || 0);
    }
    return { ...p, rt: rankTotal(p), invVal: r(invVal) };
  }).sort((a, b) => b.rt - a.rt);

  const medals = ['🥇', '🥈', '🥉'];
  let html = `<div class="hint" style="margin-bottom:10px">ランキング基準: 手元 + 預金元本 + 定期元本 + ルーレットベット + 投資コスト（利益確定前）</div>`;
  if (ranked.length === 0) return html + '<p style="color:#888;text-align:center;padding:30px">まだプレイヤーがいません</p>';
  ranked.forEach((p, i) => {
    const isMe = p.id === S.pid;
    const dep = p.deposit ? r(p.deposit.principal) : 0;
    const tdep = p.termDeposit ? r(p.termDeposit.principal) : 0;
    html += `<div class="rank-row${isMe?' me':''}">
      <div class="rank-num">${medals[i] || (i + 1)}</div>
      <div style="flex:1;min-width:0">
        <div class="row" style="margin-bottom:2px">
          <span style="font-weight:600">${p.name}</span>
          ${isMe ? '<span class="badge badge-dark" style="font-size:10px">あなた</span>' : ''}
        </div>
        <div class="hint" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
          手元:${fmt(r(p.coins||0))} 預金:${fmt(dep)} 定期:${fmt(tdep)} ルーレット:${fmt(r(p.rouletteBet||0))} 投資:${fmt(r(p.investedCost||0))} C
        </div>
      </div>
      <div style="font-weight:700;font-size:15px;white-space:nowrap">${fmt(p.rt)} C</div>
    </div>`;
  });
  return html;
}

// ---- イベントバインド ----
function bindLogin() {
  const ln = document.getElementById('l-name');
  const lp = document.getElementById('l-pass');
  if (ln) ln.oninput = e => S.lname = e.target.value;
  if (lp) { lp.oninput = e => S.lpass = e.target.value; lp.onkeydown = e => { if (e.key === 'Enter') W.login(); }; }
}
function bindEvents(p) {
  const map = [['dep-in','depAmt'],['dep-add','depAmt'],['tdep-in','tdepAmt'],['tdep-days','tdepDays'],['bet-amt','rbetAmt']];
  for (const [id, key] of map) { const el = document.getElementById(id); if (el) el.oninput = e => S[key] = e.target.value; }
  for (const sym of Object.keys(S.stocks)) {
    const b = document.getElementById('buy-' + sym); if (b) b.oninput = e => S.buyAmt[sym] = e.target.value;
    const s = document.getElementById('sell-' + sym); if (s) s.oninput = e => S.sellAmt[sym] = e.target.value;
  }
}

// ---- パブリックAPI (W) ----
window.W = {
  setTab(t) { S.tab = t; render(); },
  setMode(m) { S.lmode = m; S.lerr = ''; render(); },

  async login() {
    const name = document.getElementById('l-name')?.value.trim();
    const pass = document.getElementById('l-pass')?.value.trim();
    if (!name || !pass) { S.lerr = '名前とパスワードを入力してください'; render(); return; }
    const players = await dbGet('players') || {};
    if (S.lmode === 'register') {
      if (Object.values(players).find(p => p.name === name)) { S.lerr = 'その名前は既に使われています'; render(); return; }
      const id = 'p' + Date.now() + Math.random().toString(36).slice(2, 7);
      const now = Date.now();
      const newPlayer = { id, name, pass, coins: 0, tickets: 0, rareTickets: 0, lastTicketTime: now, deposit: null, depositBalance: 0, termDeposit: null, termDepositBalance: 0, rouletteBet: 0, holdings: {}, investedCost: 0 };
      await dbSet(`players/${id}`, newPlayer);
      S.pid = id; S.pname = name;
      sessionStorage.setItem('fm_sess', JSON.stringify({ id }));
      showToast(`ようこそ、${name}さん！`);
      S.tab = 'home'; S.lerr = '';
    } else {
      const found = Object.values(players).find(p => p.name === name && p.pass === pass);
      if (!found) { S.lerr = '名前またはパスワードが間違っています'; render(); return; }
      S.pid = found.id; S.pname = found.name;
      sessionStorage.setItem('fm_sess', JSON.stringify({ id: found.id }));
      showToast(`おかえり、${found.name}さん！`);
      S.tab = 'home'; S.lerr = '';
    }
    render();
  },

  logout() {
    sessionStorage.removeItem('fm_sess');
    S.pid = null; S.pname = ''; S.tab = 'home';
    render();
  },

  async useTicket(type) {
    const p = await dbGet(`players/${S.pid}`); if (!p) return;
    if (type === 'normal') {
      if ((p.tickets || 0) < 1) { showToast('チケットがありません'); return; }
      await dbUpdate(`players/${S.pid}`, { tickets: p.tickets - 1, coins: r((p.coins || 0) + 1) });
      showToast('+1 COIN 獲得！');
    } else {
      if ((p.rareTickets || 0) < 1) { showToast('レアチケットがありません'); return; }
      const gain = Math.floor(Math.random() * 10) + 1;
      await dbUpdate(`players/${S.pid}`, { rareTickets: p.rareTickets - 1, coins: r((p.coins || 0) + gain) });
      showToast(`★ レアチケット使用！ +${gain} COIN！`);
    }
  },

  async doDeposit() {
    const amt = r(parseFloat(document.getElementById('dep-in')?.value) || 0);
    if (amt <= 0) { showToast('金額を入力してください'); return; }
    const p = await dbGet(`players/${S.pid}`);
    if (amt > r(p.coins || 0)) { showToast('COINが不足しています'); return; }
    await dbUpdate(`players/${S.pid}`, { coins: r((p.coins||0) - amt), deposit: { principal: amt, since: Date.now() }, depositBalance: amt });
    S.depAmt = ''; showToast(`${fmt(amt)} COINを預金しました`);
  },

  async addDeposit() {
    const amt = r(parseFloat(document.getElementById('dep-add')?.value) || 0);
    if (amt <= 0) { showToast('金額を入力してください'); return; }
    const p = await dbGet(`players/${S.pid}`);
    if (amt > r(p.coins || 0)) { showToast('COINが不足しています'); return; }
    const now = Date.now();
    const curBal = r(p.deposit.principal * Math.pow(1.01, (now - p.deposit.since) / 86400000));
    const newPrincipal = r(curBal + amt);
    await dbUpdate(`players/${S.pid}`, { coins: r((p.coins||0) - amt), deposit: { principal: newPrincipal, since: now }, depositBalance: newPrincipal });
    S.depAmt = ''; showToast(`${fmt(amt)} COINを追加預金しました`);
  },

  async withdrawDeposit() {
    const p = await dbGet(`players/${S.pid}`); if (!p || !p.deposit) return;
    const now = Date.now();
    const bal = r(p.deposit.principal * Math.pow(1.01, (now - p.deposit.since) / 86400000));
    await dbUpdate(`players/${S.pid}`, { coins: r((p.coins||0) + bal), deposit: null, depositBalance: 0 });
    showToast(`${fmt(bal)} COINを引き出しました`);
  },

  async doTermDeposit() {
    const amt = r(parseFloat(document.getElementById('tdep-in')?.value) || 0);
    const days = parseInt(document.getElementById('tdep-days')?.value) || 7;
    if (amt <= 0) { showToast('金額を入力してください'); return; }
    if (days < 7) { showToast('7日以上を指定してください'); return; }
    const p = await dbGet(`players/${S.pid}`);
    if (p.termDeposit && p.termDeposit.principal > 0) { showToast('既に定期預金があります'); return; }
    if (amt > r(p.coins || 0)) { showToast('COINが不足しています'); return; }
    await dbUpdate(`players/${S.pid}`, { coins: r((p.coins||0) - amt), termDeposit: { principal: amt, since: Date.now(), days }, termDepositBalance: amt });
    S.tdepAmt = ''; showToast(`${fmt(amt)} COINを${days}日間定期預金しました`);
  },

  async withdrawTermDeposit() {
    const p = await dbGet(`players/${S.pid}`); if (!p || !p.termDeposit) return;
    const now = Date.now();
    const elapsed = (now - p.termDeposit.since) / 86400000;
    const matured = elapsed >= p.termDeposit.days;
    const ret = matured ? r(p.termDeposit.principal * Math.pow(1.02, elapsed)) : r(p.termDeposit.principal);
    await dbUpdate(`players/${S.pid}`, { coins: r((p.coins||0) + ret), termDeposit: null, termDepositBalance: 0 });
    if (matured) showToast(`定期満期！ ${fmt(ret)} COIN返還`);
    else showToast(`期限前解約。元本 ${fmt(ret)} COIN返還`);
  },

  toggleBet(type) {
    const amt = Math.max(1, r(parseFloat(S.rbetAmt) || 1));
    if (S.rbets[type]) delete S.rbets[type];
    else S.rbets[type] = amt;
    render();
  },
  clearBets() { S.rbets = {}; render(); },

  async placeBet() {
    const bets = S.rbets;
    const total = r(Object.values(bets).reduce((a, b) => a + b, 0));
    if (total <= 0) { showToast('賭け箇所を選んでください'); return; }
    const p = await dbGet(`players/${S.pid}`);
    if (total > r(p.coins || 0)) { showToast('COINが不足しています'); return; }
    await dbUpdate(`players/${S.pid}`, { coins: r((p.coins||0) - total), rouletteBet: r((p.rouletteBet||0) + total) });
    const rd = await dbGet('roulette') || { next: Date.now() + 3600000, bets: {} };
    const existingBets = rd.bets || {};
    const myKey = S.pid.replace(/[.#$\[\]]/g, '_');
    const existing = existingBets[myKey];
    if (existing) {
      for (const [k, v] of Object.entries(bets)) existing.bets[k] = r((existing.bets[k] || 0) + v);
      existing.amount = r((existing.amount || 0) + total);
      existingBets[myKey] = existing;
    } else {
      existingBets[myKey] = { playerId: S.pid, bets: { ...bets }, amount: total };
    }
    await dbUpdate('roulette', { bets: existingBets });
    S.rbets = {}; S.rbetAmt = '1';
    showToast(`${fmt(total)} COINをベット確定！`);
  },

  async buyStock(sym) {
    const qty = r(parseFloat(document.getElementById('buy-' + sym)?.value) || 0);
    if (qty <= 0) { showToast('株数を入力してください'); return; }
    const s = S.stocks[sym]; if (!s) return;
    const cost = r(s.price * qty);
    const p = await dbGet(`players/${S.pid}`);
    if (cost > r(p.coins || 0)) { showToast('COINが不足しています'); return; }
    const holdings = p.holdings || {};
    holdings[sym] = r((holdings[sym] || 0) + qty);
    await dbUpdate(`players/${S.pid}`, { coins: r((p.coins||0) - cost), holdings, investedCost: r((p.investedCost||0) + cost) });
    S.buyAmt[sym] = ''; showToast(`${sym} ${qty}株を購入 (-${fmt(cost)} COIN)`);
  },

  async sellStock(sym) {
    const qty = r(parseFloat(document.getElementById('sell-' + sym)?.value) || 0);
    if (qty <= 0) { showToast('株数を入力してください'); return; }
    const p = await dbGet(`players/${S.pid}`);
    if ((p.holdings?.[sym] || 0) < qty) { showToast('保有数が不足しています'); return; }
    const s = S.stocks[sym]; if (!s) return;
    const rev = r(s.price * qty);
    const totalHeld = Object.values(p.holdings || {}).reduce((a, b) => a + b, 0);
    const avgCost = totalHeld > 0 ? (p.investedCost || 0) / totalHeld : 0;
    const holdings = { ...p.holdings };
    holdings[sym] = r((holdings[sym] || 0) - qty);
    const newInvestedCost = Math.max(0, r((p.investedCost || 0) - r(avgCost * qty)));
    await dbUpdate(`players/${S.pid}`, { coins: r((p.coins||0) + rev), holdings, investedCost: newInvestedCost });
    S.sellAmt[sym] = ''; showToast(`${sym} ${qty}株を売却 (+${fmt(rev)} COIN)`);
  },
};

// ---- 起動 ----
async function main() {
  await ensureDefaults();
  const sess = sessionStorage.getItem('fm_sess');
  if (sess) {
    const { id } = JSON.parse(sess);
    const p = await dbGet(`players/${id}`);
    if (p) { S.pid = id; S.pname = p.name; }
  }
  subscribeAll();
  setInterval(periodicCheck, 10000);
}

main().catch(e => {
  console.error(e);
  document.getElementById('app').innerHTML = `<div style="padding:40px;font-family:system-ui;color:#c0392b"><h2>接続エラー</h2><p style="margin-top:8px;color:#444">${e.message}</p><p style="margin-top:6px;font-size:13px;color:#888">firebaseConfigの設定を確認してください。</p></div>`;
});
</script>

.badge-purple { background: #faf5ff; color: #6b21a8; border: 1px solid #e9d5ff; }
.progress-bar { height: 5px; background: #e5e3de; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #1a1a1a; transition: width 1s linear; }
.err { color: #c0392b; font-size: 12px; margin-top: 5px; }
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-card { background: #fff; border: 1px solid #e0ddd8; border-radius: 12px; padding: 28px; width: 100%; max-width: 320px; }
.login-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.login-sub { font-size: 12px; color: #888; text-align: center; margin-bottom: 20px; }
.mode-btns { display: flex; border: 1px solid #ccc; border-radius: 7px; overflow: hidden; margin-bottom: 16px; }
.mode-btn { flex: 1; padding: 8px; border: none; background: #fff; cursor: pointer; font-size: 13px; color: #666; font-family: inherit; transition: all .15s; }
.mode-btn.active { background: #1a1a1a; color: #fff; font-weight: 700; }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 12px; color: #555; margin-bottom: 4px; display: block; font-weight: 600; }
.r-cell { padding: 5px 2px; text-align: center; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 700; border: 2px solid transparent; transition: all .1s; user-select: none; line-height: 1.2; }
.r-cell:hover { opacity: .8; transform: scale(1.08); }
.r-cell.sel { border-color: #fff; box-shadow: 0 0 0 2px #1a1a1a; }
.r-red { background: #c0392b; color: #fff; }
.r-black { background: #2c2c2c; color: #fff; }
.r-green { background: #1d9e75; color: #fff; }
.r-out { background: #f0ede8; color: #1a1a1a; border: 1px solid #ccc; }
.r-out.sel { border: 2px solid #1a1a1a; }
.rank-row { display: flex; align-items: center; gap: 10px; padding: 9px 6px; border-radius: 8px; border-bottom: 1px solid #e0ddd8; }
.rank-row:last-child { border-bottom: none; }
.rank-row.me { background: #f5f4f1; }
.rank-num { font-size: 18px; width: 28px; text-align: center; }
.price-up { color: #166534; }
.price-down { color: #991b1b; }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; background: #1a1a1a; color: #fff; border-radius: 8px; font-size: 13px; z-index: 9999; max-width: 280px; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
@media (max-width: 480px) {
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .tab { padding: 9px 10px; font-size: 12px; }
}
